<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打砖块游戏</title>
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2768422999984116"
        crossorigin="anonymous"></script>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 根变量定义 */
        :root {
            --primary-color: #00ffff;
            --secondary-color: #ff00ff;
            --accent-color: #ffff00;
            --bg-color: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #ffffff;
            --shadow: 0 4px 20px rgba(0, 255, 255, 0.3);
            --border-radius: 15px;
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #1a1a1a 50%, var(--bg-color) 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 背景动画 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(0, 255, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 0, 255, 0.1) 0%, transparent 50%);
            z-index: -1;
            animation: backgroundPulse 10s ease-in-out infinite alternate;
        }

        @keyframes backgroundPulse {
            0% { opacity: 0.3; }
            100% { opacity: 0.6; }
        }

        /* 游戏容器 */
        .game-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 255, 255, 0.3);
            position: relative;
            max-width: 1000px;
            width: 100%;
            margin: 20px;
        }

        /* 游戏标题 */
        .game-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            text-align: center;
            margin-bottom: 20px;
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            0% { filter: brightness(1); }
            100% { filter: brightness(1.3); }
        }

        /* 游戏控制区域 */
        .game-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: var(--border-radius);
            border: 1px solid rgba(0, 255, 255, 0.2);
            flex-wrap: wrap;
        }

        .game-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: var(--bg-color);
            border: none;
            padding: 10px 20px;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-weight: 700;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.4);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(0, 255, 255, 0.6);
        }

        /* 游戏信息 */
        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: var(--border-radius);
            border: 1px solid rgba(0, 255, 255, 0.2);
            flex-wrap: wrap;
            gap: 20px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .info-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        /* 游戏板 */
        .game-board {
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 255, 255, 0.3);
            position: relative;
            height: 600px;
            margin-bottom: 30px;
        }

        /* 游戏区域 */
        .game-area {
            position: absolute;
            width: 800px;
            height: 500px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(45deg, #111 0%, #333 50%, #111 100%);
            overflow: hidden;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        /* 挡板 */
        .paddle {
            position: absolute;
            width: 100px;
            height: 20px;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            border-radius: var(--border-radius);
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 255, 255, 0.3);
            z-index: 10;
        }

        .paddle:hover {
            transform: translateX(-50%) scale(1.1);
            box-shadow: 0 6px 25px rgba(0, 255, 255, 0.6);
        }

        /* 球 */
        .ball {
            position: absolute;
            width: 20px;
            height: 20px;
            background: linear-gradient(45deg, var(--accent-color), var(--primary-color));
            border-radius: 50%;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 0 20px rgba(255, 255, 0, 0.8);
            border: 1px solid rgba(0, 255, 255, 0.3);
            z-index: 10;
        }

        /* 砖块 */
        .brick {
            position: absolute;
            width: 70px;
            height: 30px;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 255, 255, 0.3);
            font-size: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .brick:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(0, 255, 255, 0.6);
        }

        /* 游戏结束界面 */
        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-bg);
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 50px rgba(0, 0, 255, 0.5);
            border: 1px solid rgba(0, 255, 255, 0.3);
            z-index: 1000;
            text-align: center;
            display: none;
        }

        .game-over.active {
            display: block;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .game-over h2 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            margin-bottom: 20px;
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        .game-over p {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .game-board {
                height: 400px;
            }

            .game-area {
                width: 300px;
                height: 300px;
            }

            .paddle {
                width: 80px;
                height: 15px;
            }

            .ball {
                width: 15px;
                height: 15px;
            }

            .brick {
                width: 50px;
                height: 20px;
                font-size: 0.8rem;
            }

            .game-title {
                font-size: 2rem;
            }

            .game-buttons {
                flex-direction: column;
                width: 100%;
            }

            .btn {
                width: 100%;
            }
        }

        /* 加载动画 */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            font-size: 1.2rem;
            color: var(--text-color);
        }

        /* 返回按钮 */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--card-bg);
            color: var(--text-color);
            border: 1px solid rgba(0, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow);
            font-weight: 500;
        }

        .back-btn:hover {
            background: var(--primary-color);
            color: var(--bg-color);
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <button class="back-btn" onclick="window.location.href='index.html'">← 回到主页</button>
        <h1 class="game-title">🧱 打砖块游戏</h1>
        
        <div class="game-controls">
            <div class="game-buttons">
                <button class="btn" id="newGameBtn">新游戏</button>
                <button class="btn" id="pauseBtn">暂停</button>
            </div>
        </div>

        <div class="game-info">
            <div class="info-item">
                <span class="info-label">得分</span>
                <span class="info-value" id="score">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">生命</span>
                <span class="info-value" id="lives">3</span>
            </div>
            <div class="info-item">
                <span class="info-label">砖块</span>
                <span class="info-value" id="bricksLeft">50</span>
            </div>
        </div>

        <div class="game-board" id="gameBoard">
            <div class="game-area" id="gameArea">
                <div class="paddle" id="paddle"></div>
                <div class="ball" id="ball">⚽</div>
            </div>
        </div>

        <div class="game-over" id="gameOver">
            <h2 id="gameOverTitle">游戏结束!</h2>
            <p id="gameOverMessage">很遗憾，你没有接住球！</p>
            <p>得分: <span id="finalScore">0</span></p>
            <p>生命: <span id="finalLives">3</span></p>
            <p>剩余砖块: <span id="finalBricksLeft">50</span></p>
            <button class="btn" id="restartBtn">再玩一次</button>
        </div>
    </div>

    <script>
        // 打砖块游戏实现
        const PADDLE_SPEED = 10;
        const BALL_SPEED = 5;
        const BRICK_ROWS = 5;
        const BRICK_COLS = 8;
        const BRICK_WIDTH = 70;
        const BRICK_HEIGHT = 30;
        const BRICK_GAP = 10;
        const BRICK_OFFSET_TOP = 50;
        const BRICK_OFFSET_LEFT = 25;

        let paddle = { x: 350, y: 450, width: 100, height: 20, speed: PADDLE_SPEED };
        let ball = { x: 400, y: 400, width: 20, height: 20, dx: BALL_SPEED, dy: -BALL_SPEED };
        let bricks = [];
        let score = 0;
        let lives = 3;
        let bricksLeft = BRICK_ROWS * BRICK_COLS;
        let gameOver = false;
        let gamePaused = false;
        let animationId;

        const gameAreaElement = document.getElementById('gameArea');
        const paddleElement = document.getElementById('paddle');
        const ballElement = document.getElementById('ball');
        const scoreElement = document.getElementById('score');
        const livesElement = document.getElementById('lives');
        const bricksLeftElement = document.getElementById('bricksLeft');
        const newGameBtn = document.getElementById('newGameBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const gameOverElement = document.getElementById('gameOver');
        const gameOverTitle = document.getElementById('gameOverTitle');
        const gameOverMessage = document.getElementById('gameOverMessage');
        const finalScoreElement = document.getElementById('finalScore');
        const finalLivesElement = document.getElementById('finalLives');
        const finalBricksLeftElement = document.getElementById('finalBricksLeft');
        const restartBtn = document.getElementById('restartBtn');

        // 初始化游戏
        function initGame() {
            // 重置游戏状态
            score = 0;
            lives = 3;
            bricksLeft = BRICK_ROWS * BRICK_COLS;
            gameOver = false;
            gamePaused = false;
            
            // 重置挡板和球的位置
            paddle.x = 350;
            paddle.y = 450;
            ball.x = 400;
            ball.y = 400;
            ball.dx = BALL_SPEED;
            ball.dy = -BALL_SPEED;
            
            // 初始化砖块
            initBricks();
            
            // 更新 UI
            scoreElement.textContent = score;
            livesElement.textContent = lives;
            bricksLeftElement.textContent = bricksLeft;
            gameOverElement.classList.remove('active');
            
            // 开始游戏循环
            startGameLoop();
        }

        // 初始化砖块
        function initBricks() {
            bricks = [];
            const colors = [
                'linear-gradient(45deg, #ff0000, #ff6600)',
                'linear-gradient(45deg, #00ff00, #006600)',
                'linear-gradient(45deg, #0000ff, #6600ff)',
                'linear-gradient(45deg, #ffff00, #ff6600)',
                'linear-gradient(45deg, #ff00ff, #6600ff)'
            ];
            
            for (let row = 0; row < BRICK_ROWS; row++) {
                for (let col = 0; col < BRICK_COLS; col++) {
                    const brick = {
                        x: col * (BRICK_WIDTH + BRICK_GAP) + BRICK_OFFSET_LEFT,
                        y: row * (BRICK_HEIGHT + BRICK_GAP) + BRICK_OFFSET_TOP,
                        width: BRICK_WIDTH,
                        height: BRICK_HEIGHT,
                        color: colors[row],
                        visible: true
                    };
                    
                    const brickElement = document.createElement('div');
                    brickElement.className = 'brick';
                    brickElement.style.left = brick.x + 'px';
                    brickElement.style.top = brick.y + 'px';
                    brickElement.style.width = brick.width + 'px';
                    brickElement.style.height = brick.height + 'px';
                    brickElement.style.background = brick.color;
                    brickElement.textContent = '🧱';
                    gameAreaElement.appendChild(brickElement);
                    
                    brick.element = brickElement;
                    bricks.push(brick);
                }
            }
        }

        // 游戏循环
        function startGameLoop() {
            const loop = () => {
                if (gameOver || gamePaused) {
                    animationId = requestAnimationFrame(loop);
                    return;
                }
                
                update();
                draw();
                
                animationId = requestAnimationFrame(loop);
            };
            loop();
        }

        // 处理键盘输入
        function handleKeyboardInput() {
            const keysPressed = {};
            
            document.addEventListener('keydown', (e) => {
                keysPressed[e.key] = true;
            });
            
            document.addEventListener('keyup', (e) => {
                keysPressed[e.key] = false;
            });
            
            if (keysPressed['ArrowLeft']) {
                paddle.x = Math.max(0, paddle.x - paddle.speed);
            }
            
            if (keysPressed['ArrowRight']) {
                paddle.x = Math.min(700, paddle.x + paddle.speed);
            }
        }

        // 更新游戏状态
        function update() {
            // 处理键盘输入
            handleKeyboardInput();
            
            // 移动球
            ball.x += ball.dx;
            ball.y += ball.dy;
            
            // 碰撞检测
            // 边界碰撞
            if (ball.x <= 0 || ball.x >= 800 - ball.width) {
                ball.dx = -ball.dx;
            }
            
            if (ball.y <= 0) {
                ball.dy = -ball.dy;
            }
            
            // 挡板碰撞
            if (
                ball.x < paddle.x + paddle.width &&
                ball.x + ball.width > paddle.x &&
                ball.y < paddle.y + paddle.height &&
                ball.y + ball.height > paddle.y
            ) {
                ball.dy = -Math.abs(ball.dy);
            }
            
            // 砖块碰撞
            bricks.forEach(brick => {
                if (brick.visible &&
                    ball.x < brick.x + brick.width &&
                    ball.x + ball.width > brick.x &&
                    ball.y < brick.y + brick.height &&
                    ball.y + ball.height > brick.y) {
                    ball.dy = -ball.dy;
                    brick.visible = false;
                    brick.element.style.display = 'none';
                    score += 10;
                    bricksLeft--;
                    scoreElement.textContent = score;
                    bricksLeftElement.textContent = bricksLeft;
                    
                    if (bricksLeft === 0) {
                        gameOver = true;
                        clearInterval(animationId);
                        showGameOver('恭喜获胜！你清除了所有砖块！');
                    }
                }
            });
            
            // 球落地
            if (ball.y > 500) {
                lives--;
                livesElement.textContent = lives;
                
                if (lives === 0) {
                    gameOver = true;
                    clearInterval(animationId);
                    showGameOver('很遗憾，你没有接住球！');
                } else {
                    // 重置球的位置
                    ball.x = 400;
                    ball.y = 400;
                    ball.dx = BALL_SPEED;
                    ball.dy = -BALL_SPEED;
                }
            }
        }

        // 绘制游戏元素
        function draw() {
            // 绘制挡板
            paddleElement.style.left = paddle.x + 'px';
            paddleElement.style.top = paddle.y + 'px';
            paddleElement.style.width = paddle.width + 'px';
            paddleElement.style.height = paddle.height + 'px';
            
            // 绘制球
            ballElement.style.left = ball.x + 'px';
            ballElement.style.top = ball.y + 'px';
            ballElement.style.width = ball.width + 'px';
            ballElement.style.height = ball.height + 'px';
        }

        // 显示游戏结束信息
        function showGameOver(message) {
            gameOverTitle.textContent = message.includes('获胜') ? '恭喜获胜！' : '游戏结束!';
            gameOverMessage.textContent = message;
            finalScoreElement.textContent = score;
            finalLivesElement.textContent = lives;
            finalBricksLeftElement.textContent = bricksLeft;
            gameOverElement.classList.add('active');
        }

        // 暂停/继续游戏
        function togglePause() {
            if (gameOver) return;
            
            gamePaused = !gamePaused;
            pauseBtn.textContent = gamePaused ? '继续' : '暂停';
        }

        // 事件监听器
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                paddle.x = Math.max(0, paddle.x - paddle.speed);
            } else if (e.key === 'ArrowRight') {
                paddle.x = Math.min(700, paddle.x + paddle.speed);
            }
        });

        newGameBtn.addEventListener('click', initGame);
        pauseBtn.addEventListener('click', togglePause);
        restartBtn.addEventListener('click', () => {
            gameOverElement.classList.remove('active');
            initGame();
        });

        // 初始化游戏
        initGame();
    </script>
</body>
</html>
