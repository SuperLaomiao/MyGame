<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吃豆人游戏</title>
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2768422999984116"
        crossorigin="anonymous"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 5px;
        }

        .game-title {
            font-size: 24px;
            font-weight: bold;
            margin: 0;
        }

        .game-info {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .score {
            font-size: 20px;
            font-weight: bold;
        }

        .lives {
            font-size: 20px;
            font-weight: bold;
            color: #ff0000;
        }

        .level {
            font-size: 20px;
            font-weight: bold;
            color: #00ff00;
        }

        .game-board {
            background-color: #000;
            border: 3px solid #ffcc00;
            border-radius: 5px;
            position: relative;
            width: 560px;
            height: 448px;
            overflow: hidden;
        }

        .grid-cell {
            position: absolute;
            width: 28px;
            height: 28px;
            box-sizing: border-box;
        }

        .wall {
            background-color: #0000ff;
            border: 1px solid #4444ff;
        }

        .dot {
            background-color: #ffff00;
            border-radius: 50%;
            width: 6px;
            height: 6px;
            margin: 11px;
        }

        .power-pellet {
            background-color: #ffff00;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            margin: 4px;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        .pacman {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #ffff00;
            border-radius: 50%;
            margin: 4px;
            z-index: 10;
        }

        .pacman-open {
            clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 100%, 50% 50%, 0 100%);
        }

        .pacman-closed {
            clip-path: circle(50% at 50% 50%);
        }

        .ghost {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50% 50% 0 0;
            margin: 4px;
            z-index: 9;
        }

        .ghost-red { background-color: #ff0000; }
        .ghost-blue { background-color: #0000ff; }
        .ghost-pink { background-color: #ff00ff; }
        .ghost-orange { background-color: #ffaa00; }

        .cage {
            position: absolute;
            width: 84px;
            height: 84px;
            background-color: #000;
            border: 2px solid #4444ff;
            border-radius: 50%;
            left: 50%;
            transform: translateX(-50%);
            bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            z-index: 11;
        }

        .cage-door {
            position: absolute;
            width: 20px;
            height: 40px;
            background-color: #0000ff;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 12;
        }

        .cage-ghost {
            width: 15px;
            height: 15px;
            border-radius: 50% 50% 0 0;
        }

        .game-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 5px;
        }

        .btn {
            background-color: #ffcc00;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #ffdd33;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 5px;
            border: 2px solid #ffcc00;
            text-align: center;
            z-index: 1000;
        }

        .game-over h2 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #ffcc00;
        }

        .game-over p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1 class="game-title">吃豆人</h1>
            <div class="game-info">
                <div class="score">
                    得分: <span id="score">0</span>
                </div>
                <div class="lives">
                    生命: <span id="lives">3</span>
                </div>
                <div class="level">
                    关卡: <span id="level">1</span>
                </div>
            </div>
        </div>

        <div class="game-board" id="gameBoard">
            <div class="cage" id="cage">
                <div class="cage-door" id="cageDoor"></div>
            </div>
        </div>

        <div class="game-controls">
            <div class="controls-info">
                <p>使用方向键移动吃豆人</p>
            </div>
            <div class="controls-buttons">
                <button class="btn" id="newGameBtn">新游戏</button>
                <button class="btn" id="pauseBtn">暂停</button>
            </div>
        </div>

        <div class="game-over hidden" id="gameOver">
            <h2>游戏结束!</h2>
            <p>最终得分: <span id="finalScore">0</span></p>
            <p>关卡: <span id="finalLevel">1</span></p>
            <button class="btn" id="restartBtn">再玩一次</button>
        </div>
    </div>

    <script>
        // 吃豆人游戏实现
        const GRID_SIZE = 28;
        const ROWS = 16;
        const COLS = 20;

        const DIRECTIONS = {
            up: { x: 0, y: -1 },
            down: { x: 0, y: 1 },
            left: { x: -1, y: 0 },
            right: { x: 1, y: 0 }
        };

        const LEVELS = [
            [
                "WWWWWWWWWWWWWWWWWWWW",
                "W............WWWWWW",
                "W.WWWWW.WWWWW.WW..WW",
                "W..W....W....W..W.W",
                "W.WWW.W.WWW.W.W.W.W",
                "W............W..W.W",
                "W.WWWWWWWWW.W.W.W.W",
                "W.............W...W",
                "WWWWWWWWWWWWWWWW.WW",
                "W.............W...W",
                "W.WWWWWWWWW.W.W.W.W",
                "W............W..W.W",
                "W.WWW.W.WWW.W.W.W.W",
                "W..W....W....W..W.W",
                "W.WWWWW.WWWWW.WW..WW",
                "WWWWWWWWWWWWWWWWWWWW"
            ]
        ];

        let gameBoard = [];
        let pacman = null;
        let ghosts = [];
        let dots = [];
        let powerPellets = [];
        let score = 0;
        let lives = 3;
        let level = 0;
        let gameRunning = false;
        let gamePaused = false;
        let animationId;

        const gameBoardElement = document.getElementById('gameBoard');
        const scoreElement = document.getElementById('score');
        const livesElement = document.getElementById('lives');
        const levelElement = document.getElementById('level');
        const newGameBtn = document.getElementById('newGameBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const gameOverElement = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('finalScore');
        const finalLevelElement = document.getElementById('finalLevel');
        const restartBtn = document.getElementById('restartBtn');

        // 初始化游戏
        function initGame() {
            // 清除游戏板
            gameBoardElement.innerHTML = '';
            const cage = document.createElement('div');
            cage.className = 'cage';
            cage.id = 'cage';
            const cageDoor = document.createElement('div');
            cageDoor.className = 'cage-door';
            cageDoor.id = 'cageDoor';
            cage.appendChild(cageDoor);
            gameBoardElement.appendChild(cage);
            
            gameBoard = [];
            pacman = null;
            ghosts = [];
            dots = [];
            powerPellets = [];
            score = 0;
            lives = 3;
            level = 0;
            scoreElement.textContent = score;
            livesElement.textContent = lives;
            levelElement.textContent = level + 1;
            
            loadLevel(level);
            
            gameRunning = true;
            newGameBtn.textContent = '新游戏';
            newGameBtn.disabled = true;
            pauseBtn.disabled = false;
            pauseBtn.textContent = '暂停';
            gameOverElement.classList.add('hidden');
            
            gameLoop();
        }

        function loadLevel(levelIndex) {
            const levelData = LEVELS[levelIndex % LEVELS.length];
            
            for (let row = 0; row < levelData.length; row++) {
                for (let col = 0; col < levelData[row].length; col++) {
                    const cell = levelData[row][col];
                    
                    if (cell === 'W') {
                        createWall(col, row);
                    } else if (cell === '.') {
                        createDot(col, row);
                    } else if (cell === 'O') {
                        createPowerPellet(col, row);
                    } else if (cell === 'P') {
                        createPacman(col, row);
                    } else if (cell === 'G') {
                        createGhost(col, row);
                    }
                }
            }
            
            if (!pacman) {
                createPacman(1, 1);
            }
            
            const ghostPositions = [
                [9, ROWS - 1],
                [10, ROWS - 1],
                [9, ROWS - 2],
                [10, ROWS - 2]
            ];
            
            for (let i = 0; i < ghostPositions.length; i++) {
                const [x, y] = ghostPositions[i];
                if (!cellAt(x, y)) {
                    createGhost(x, y);
                }
            }
            
            const powerPelletPositions = [
                [1, 1],
                [18, 1],
                [1, ROWS - 2],
                [18, ROWS - 2]
            ];
            
            powerPelletPositions.forEach(([x, y]) => {
                if (!cellAt(x, y)) {
                    createPowerPellet(x, y);
                }
            });
        }

        function createWall(x, y) {
            const cell = document.createElement('div');
            cell.className = 'grid-cell wall';
            cell.style.left = `${x * GRID_SIZE}px`;
            cell.style.top = `${y * GRID_SIZE}px`;
            cell.style.width = `${GRID_SIZE}px`;
            cell.style.height = `${GRID_SIZE}px`;
            gameBoardElement.appendChild(cell);
            gameBoard.push({ x, y, type: 'wall', element: cell });
        }

        function createDot(x, y) {
            const cell = document.createElement('div');
            cell.className = 'grid-cell dot';
            cell.style.left = `${x * GRID_SIZE}px`;
            cell.style.top = `${y * GRID_SIZE}px`;
            cell.style.width = `${GRID_SIZE}px`;
            cell.style.height = `${GRID_SIZE}px`;
            cell.innerHTML = '<div class="dot"></div>';
            gameBoardElement.appendChild(cell);
            dots.push({ x, y, type: 'dot', element: cell });
        }

        function createPowerPellet(x, y) {
            const cell = document.createElement('div');
            cell.className = 'grid-cell power-pellet';
            cell.style.left = `${x * GRID_SIZE}px`;
            cell.style.top = `${y * GRID_SIZE}px`;
            cell.style.width = `${GRID_SIZE}px`;
            cell.style.height = `${GRID_SIZE}px`;
            cell.innerHTML = '<div class="power-pellet"></div>';
            gameBoardElement.appendChild(cell);
            powerPellets.push({ x, y, type: 'power-pellet', element: cell });
        }

        function createPacman(x, y) {
            const cell = document.createElement('div');
            cell.className = 'grid-cell pacman pacman-open';
            cell.style.left = `${x * GRID_SIZE}px`;
            cell.style.top = `${y * GRID_SIZE}px`;
            cell.style.width = `${GRID_SIZE}px`;
            cell.style.height = `${GRID_SIZE}px`;
            gameBoardElement.appendChild(cell);
            pacman = { x, y, direction: 'right', element: cell, open: true };
        }

        function createGhost(x, y) {
            const cell = document.createElement('div');
            const colors = ['ghost-red', 'ghost-blue', 'ghost-pink', 'ghost-orange'];
            const color = colors[ghosts.length % colors.length];
            cell.className = `grid-cell ghost ${color}`;
            cell.style.left = `${x * GRID_SIZE}px`;
            cell.style.top = `${y * GRID_SIZE}px`;
            cell.style.width = `${GRID_SIZE}px`;
            cell.style.height = `${GRID_SIZE}px`;
            gameBoardElement.appendChild(cell);
            ghosts.push({ x, y, direction: 'left', element: cell, color });
        }

        function cellAt(x, y) {
            if (x < 0 || x >= COLS || y < 0 || y >= ROWS) {
                return null;
            }
            
            return gameBoard.find(cell => cell.x === x && cell.y === y);
        }

        function isValidMove(x, y) {
            const cell = cellAt(x, y);
            return cell && cell.type !== 'wall';
        }

        function movePacman(direction) {
            if (!gameRunning || gamePaused) return;
            
            const newX = pacman.x + DIRECTIONS[direction].x;
            const newY = pacman.y + DIRECTIONS[direction].y;
            
            if (isValidMove(newX, newY)) {
                pacman.x = newX;
                pacman.y = newY;
                pacman.direction = direction;
                pacman.element.style.left = `${newX * GRID_SIZE}px`;
                pacman.element.style.top = `${newY * GRID_SIZE}px`;
                
                checkDotCollision();
                checkPowerPelletCollision();
                checkGhostCollision();
                checkLevelComplete();
            }
        }

        function checkDotCollision() {
            const dotIndex = dots.findIndex(dot => dot.x === pacman.x && dot.y === pacman.y);
            if (dotIndex !== -1) {
                dots[dotIndex].element.remove();
                dots.splice(dotIndex, 1);
                score += 10;
                scoreElement.textContent = score;
            }
        }

        function checkPowerPelletCollision() {
            const pelletIndex = powerPellets.findIndex(pellet => pellet.x === pacman.x && pellet.y === pacman.y);
            if (pelletIndex !== -1) {
                powerPellets[pelletIndex].element.remove();
                powerPellets.splice(pelletIndex, 1);
                score += 50;
                scoreElement.textContent = score;
                
                activatePowerMode();
            }
        }

        function activatePowerMode() {
            ghosts.forEach(ghost => {
                ghost.element.classList.remove('ghost-red', 'ghost-blue', 'ghost-pink', 'ghost-orange');
                ghost.element.classList.add('ghost-blue');
            });
            
            setTimeout(deactivatePowerMode, 3000);
        }

        function deactivatePowerMode() {
            ghosts.forEach((ghost, index) => {
                ghost.element.classList.remove('ghost-blue');
                const colors = ['ghost-red', 'ghost-blue', 'ghost-pink', 'ghost-orange'];
                const color = colors[index % colors.length];
                ghost.element.classList.add(color);
                ghost.color = color;
            });
        }

        function checkGhostCollision() {
            for (let ghost of ghosts) {
                if (ghost.x === pacman.x && ghost.y === pacman.y) {
                    if (ghost.element.classList.contains('ghost-blue')) {
                        ghost.element.remove();
                        ghost.x = Math.floor(Math.random() * COLS);
                        ghost.y = Math.floor(Math.random() * ROWS);
                        score += 200;
                        scoreElement.textContent = score;
                    } else {
                        loseLife();
                    }
                }
            }
        }

        function loseLife() {
            lives--;
            livesElement.textContent = lives;
            
            if (lives <= 0) {
                gameOver();
            } else {
                pacman.x = 1;
                pacman.y = 1;
                pacman.element.style.left = `${1 * GRID_SIZE}px`;
                pacman.element.style.top = `${1 * GRID_SIZE}px`;
                
                ghosts.forEach((ghost, index) => {
                    const ghostPositions = [
                        [9, ROWS - 1],
                        [10, ROWS - 1],
                        [9, ROWS - 2],
                        [10, ROWS - 2]
                    ];
                    const [x, y] = ghostPositions[index % ghostPositions.length];
                    ghost.x = x;
                    ghost.y = y;
                    ghost.element.style.left = `${x * GRID_SIZE}px`;
                    ghost.element.style.top = `${y * GRID_SIZE}px`;
                });
            }
        }

        function checkLevelComplete() {
            if (dots.length === 0) {
                level++;
                levelElement.textContent = level + 1;
                
                if (level < LEVELS.length) {
                    loadLevel(level);
                } else {
                    gameWin();
                }
            }
        }

        function gameWin() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            finalScoreElement.textContent = score;
            finalLevelElement.textContent = level;
            gameOverElement.querySelector('h2').textContent = '恭喜你通关！';
            gameOverElement.classList.remove('hidden');
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            finalScoreElement.textContent = score;
            finalLevelElement.textContent = level + 1;
            gameOverElement.classList.remove('hidden');
        }

        function moveGhosts() {
            if (!gameRunning || gamePaused) return;
            
            ghosts.forEach(ghost => {
                if (Math.random() < 0.1) {
                    const directions = Object.keys(DIRECTIONS);
                    ghost.direction = directions[Math.floor(Math.random() * directions.length)];
                }
                
                const newX = ghost.x + DIRECTIONS[ghost.direction].x;
                const newY = ghost.y + DIRECTIONS[ghost.direction].y;
                
                if (isValidMove(newX, newY)) {
                    ghost.x = newX;
                    ghost.y = newY;
                    ghost.element.style.left = `${newX * GRID_SIZE}px`;
                    ghost.element.style.top = `${newY * GRID_SIZE}px`;
                } else {
                    const directions = Object.keys(DIRECTIONS);
                    ghost.direction = directions[Math.floor(Math.random() * directions.length)];
                }
            });
        }

        function gameLoop() {
            if (gameRunning && !gamePaused) {
                animatePacman();
                moveGhosts();
            }
            animationId = requestAnimationFrame(gameLoop);
        }

        function animatePacman() {
            if (pacman.open) {
                pacman.element.classList.remove('pacman-open');
                pacman.element.classList.add('pacman-closed');
            } else {
                pacman.element.classList.remove('pacman-closed');
                pacman.element.classList.add('pacman-open');
            }
            pacman.open = !pacman.open;
        }

        document.addEventListener('keydown', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
                const direction = e.key.replace('Arrow', '').toLowerCase();
                movePacman(direction);
            }
        });

        newGameBtn.addEventListener('click', initGame);
        pauseBtn.addEventListener('click', () => {
            if (!gameRunning) return;
            gamePaused = !gamePaused;
            pauseBtn.textContent = gamePaused ? '继续' : '暂停';
        });
        restartBtn.addEventListener('click', initGame);

        initGame();
    </script>
</body>
</html>
