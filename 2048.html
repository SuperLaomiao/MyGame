<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048游戏</title>
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2768422999984116"
        crossorigin="anonymous"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #faf8ef;
            color: #776e65;
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .game-title {
            font-size: 80px;
            font-weight: bold;
            color: #776e65;
            margin: 0;
        }

        .game-stats {
            display: flex;
            gap: 10px;
        }

        .stat-box {
            background-color: #bbada0;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            text-align: center;
            min-width: 80px;
        }

        .stat-label {
            font-size: 12px;
            margin-bottom: 5px;
            font-weight: bold;
            color: #eee4da;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
        }

        .game-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            background-color: #8f7a66;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #7f6a56;
        }

        .game-board {
            background-color: #bbada0;
            padding: 10px;
            border-radius: 5px;
            display: grid;
            grid-template-columns: repeat(4, 100px);
            grid-template-rows: repeat(4, 100px);
            gap: 10px;
        }

        .cell {
            background-color: #cdc1b4;
            border-radius: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
            font-weight: bold;
        }

        .cell-2 { background-color: #eee4da; color: #776e65; }
        .cell-4 { background-color: #ede0c8; color: #776e65; }
        .cell-8 { background-color: #f2b179; color: #f9f6f2; }
        .cell-16 { background-color: #f59563; color: #f9f6f2; }
        .cell-32 { background-color: #f67c5f; color: #f9f6f2; }
        .cell-64 { background-color: #f65e3b; color: #f9f6f2; }
        .cell-128 { background-color: #edcf72; color: #f9f6f2; font-size: 36px; }
        .cell-256 { background-color: #edcc61; color: #f9f6f2; font-size: 36px; }
        .cell-512 { background-color: #edc850; color: #f9f6f2; font-size: 36px; }
        .cell-1024 { background-color: #edc53f; color: #f9f6f2; font-size: 24px; }
        .cell-2048 { background-color: #edc22e; color: #f9f6f2; font-size: 24px; }
        .cell-super { background-color: #3c3a32; color: #f9f6f2; font-size: 24px; }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(238, 228, 218, 0.95);
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            z-index: 1000;
            color: #776e65;
        }

        .game-over h2 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .game-over p {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1 class="game-title">2048</h1>
            <div class="game-stats">
                <div class="stat-box">
                    <div class="stat-label">得分</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">最高</div>
                    <div class="stat-value" id="best">0</div>
                </div>
            </div>
        </div>

        <div class="game-controls">
            <button class="btn" id="newGameBtn">新游戏</button>
            <p>使用方向键移动方块</p>
        </div>

        <div class="game-board" id="gameBoard"></div>

        <div class="game-over hidden" id="gameOver">
            <h2>游戏结束!</h2>
            <p>最终得分: <span id="finalScore">0</span></p>
            <button class="btn" id="restartBtn">再玩一次</button>
        </div>
    </div>

    <script>
        // 2048游戏实现
        const SIZE = 4;
        let board = [];
        let score = 0;
        let best = localStorage.getItem('2048-best') || 0;

        const gameBoard = document.getElementById('gameBoard');
        const scoreElement = document.getElementById('score');
        const bestElement = document.getElementById('best');
        const newGameBtn = document.getElementById('newGameBtn');
        const gameOverElement = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');

        // 初始化游戏
        function initGame() {
            board = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
            score = 0;
            scoreElement.textContent = score;
            bestElement.textContent = best;
            gameOverElement.classList.add('hidden');
            addRandomTile();
            addRandomTile();
            renderBoard();
        }

        // 添加随机方块
        function addRandomTile() {
            const emptyCells = [];
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    if (board[i][j] === 0) {
                        emptyCells.push({ x: i, y: j });
                    }
                }
            }

            if (emptyCells.length > 0) {
                const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[randomCell.x][randomCell.y] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        // 渲染游戏板
        function renderBoard() {
            gameBoard.innerHTML = '';
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (board[i][j] !== 0) {
                        const value = board[i][j];
                        cell.textContent = value;
                        if (value <= 2048) {
                            cell.classList.add(`cell-${value}`);
                        } else {
                            cell.classList.add('cell-super');
                        }
                    }
                    gameBoard.appendChild(cell);
                }
            }
        }

        // 移动方块
        function move(direction) {
            let moved = false;
            
            if (direction === 'left') {
                for (let i = 0; i < SIZE; i++) {
                    const row = board[i].filter(val => val !== 0);
                    const newRow = [];
                    for (let j = 0; j < row.length; j++) {
                        if (row[j] === row[j + 1]) {
                            newRow.push(row[j] * 2);
                            score += row[j] * 2;
                            j++;
                        } else {
                            newRow.push(row[j]);
                        }
                    }
                    while (newRow.length < SIZE) {
                        newRow.push(0);
                    }
                    if (JSON.stringify(board[i]) !== JSON.stringify(newRow)) {
                        moved = true;
                    }
                    board[i] = newRow;
                }
            } else if (direction === 'right') {
                for (let i = 0; i < SIZE; i++) {
                    const row = board[i].filter(val => val !== 0);
                    const newRow = [];
                    for (let j = row.length - 1; j >= 0; j--) {
                        if (row[j] === row[j - 1]) {
                            newRow.unshift(row[j] * 2);
                            score += row[j] * 2;
                            j--;
                        } else {
                            newRow.unshift(row[j]);
                        }
                    }
                    while (newRow.length < SIZE) {
                        newRow.unshift(0);
                    }
                    if (JSON.stringify(board[i]) !== JSON.stringify(newRow)) {
                        moved = true;
                    }
                    board[i] = newRow;
                }
            } else if (direction === 'up') {
                for (let j = 0; j < SIZE; j++) {
                    const col = [];
                    for (let i = 0; i < SIZE; i++) {
                        if (board[i][j] !== 0) {
                            col.push(board[i][j]);
                        }
                    }
                    const newCol = [];
                    for (let i = 0; i < col.length; i++) {
                        if (col[i] === col[i + 1]) {
                            newCol.push(col[i] * 2);
                            score += col[i] * 2;
                            i++;
                        } else {
                            newCol.push(col[i]);
                        }
                    }
                    while (newCol.length < SIZE) {
                        newCol.push(0);
                    }
                    for (let i = 0; i < SIZE; i++) {
                        if (board[i][j] !== newCol[i]) {
                            moved = true;
                        }
                        board[i][j] = newCol[i];
                    }
                }
            } else if (direction === 'down') {
                for (let j = 0; j < SIZE; j++) {
                    const col = [];
                    for (let i = 0; i < SIZE; i++) {
                        if (board[i][j] !== 0) {
                            col.push(board[i][j]);
                        }
                    }
                    const newCol = [];
                    for (let i = col.length - 1; i >= 0; i--) {
                        if (col[i] === col[i - 1]) {
                            newCol.unshift(col[i] * 2);
                            score += col[i] * 2;
                            i--;
                        } else {
                            newCol.unshift(col[i]);
                        }
                    }
                    while (newCol.length < SIZE) {
                        newCol.unshift(0);
                    }
                    for (let i = 0; i < SIZE; i++) {
                        if (board[i][j] !== newCol[i]) {
                            moved = true;
                        }
                        board[i][j] = newCol[i];
                    }
                }
            }

            if (moved) {
                scoreElement.textContent = score;
                if (score > best) {
                    best = score;
                    bestElement.textContent = best;
                    localStorage.setItem('2048-best', best);
                }
                addRandomTile();
                renderBoard();
                if (checkGameOver()) {
                    setTimeout(() => {
                        showGameOver();
                    }, 500);
                }
            }
        }

        // 检查游戏结束
        function checkGameOver() {
            // 检查是否还有空单元格
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    if (board[i][j] === 0) {
                        return false;
                    }
                }
            }

            // 检查是否还有相邻的相同值
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    const cell = board[i][j];
                    if (j < SIZE - 1 && board[i][j + 1] === cell) {
                        return false;
                    }
                    if (i < SIZE - 1 && board[i + 1][j] === cell) {
                        return false;
                    }
                }
            }

            return true;
        }

        // 显示游戏结束
        function showGameOver() {
            finalScoreElement.textContent = score;
            gameOverElement.classList.remove('hidden');
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
                if (!gameOverElement.classList.contains('hidden')) {
                    return;
                }
                const direction = e.key.replace('Arrow', '').toLowerCase();
                move(direction);
            }
        });

        // 按钮事件
        newGameBtn.addEventListener('click', initGame);
        restartBtn.addEventListener('click', initGame);

        // 触摸支持（简单实现）
        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            
            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                // 水平滑动
                if (deltaX > 50) {
                    move('right');
                } else if (deltaX < -50) {
                    move('left');
                }
            } else {
                // 垂直滑动
                if (deltaY > 50) {
                    move('down');
                } else if (deltaY < -50) {
                    move('up');
                }
            }
        });

        // 初始化游戏
        initGame();
    </script>
</body>
</html>
