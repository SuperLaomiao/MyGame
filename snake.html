<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2768422999984116"
        crossorigin="anonymous"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2d2d2d;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .game-container {
            display: flex;
            gap: 20px;
        }

        .game-board {
            border: 3px solid #4a4a4a;
            border-radius: 8px;
            padding: 10px;
            background-color: #1a1a1a;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(20, 20px);
            grid-template-rows: repeat(20, 20px);
            gap: 1px;
            background-color: #4a4a4a;
        }

        .cell {
            width: 20px;
            height: 20px;
            border-radius: 2px;
        }

        .cell.empty {
            background-color: #1a1a1a;
        }

        .cell.snake {
            background-color: #00ff00;
        }

        .cell.food {
            background-color: #ff0000;
        }

        .game-info {
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 150px;
            background-color: #1a1a1a;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #4a4a4a;
        }

        .score {
            font-size: 24px;
            font-weight: bold;
            color: #00ff00;
            text-align: center;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            padding: 10px;
            background-color: #4a4a4a;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #6a6a6a;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #1a1a1a;
            padding: 30px;
            border-radius: 10px;
            border: 3px solid #4a4a4a;
            text-align: center;
            z-index: 1000;
        }

        .game-over h2 {
            color: #ff0000;
            margin-bottom: 20px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-board">
            <div class="grid" id="gameGrid"></div>
        </div>

        <div class="game-info">
            <div class="score">
                得分: <span id="score">0</span>
            </div>
            <div class="length">
                长度: <span id="length">1</span>
            </div>
            <div class="controls">
                <button class="btn" id="startBtn">开始游戏</button>
                <button class="btn" id="pauseBtn">暂停</button>
                <button class="btn" id="resetBtn">重新开始</button>
            </div>
        </div>
    </div>

    <div class="game-over hidden" id="gameOver">
        <h2>游戏结束!</h2>
        <div>最终得分: <span id="finalScore">0</span></div>
        <div>蛇长: <span id="finalLength">1</span></div>
        <button class="btn" id="restartBtn">再玩一次</button>
    </div>

    <script>
        // 贪吃蛇游戏实现
        const COLS = 20;
        const ROWS = 20;
        const CELL_SIZE = 20;

        let board = [];
        let snake = [];
        let food = {};
        let direction = 'right';
        let score = 0;
        let length = 1;
        let gameRunning = false;
        let gamePaused = false;
        let gameInterval;
        let gameSpeed = 150;

        const gameGrid = document.getElementById('gameGrid');
        const scoreElement = document.getElementById('score');
        const lengthElement = document.getElementById('length');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const gameOverElement = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('finalScore');
        const finalLengthElement = document.getElementById('finalLength');
        const restartBtn = document.getElementById('restartBtn');

        // 初始化游戏板
        function initBoard() {
            board = [];
            for (let r = 0; r < ROWS; r++) {
                board[r] = [];
                for (let c = 0; c < COLS; c++) {
                    board[r][c] = null;
                }
            }
        }

        // 初始化蛇
        function initSnake() {
            const startX = Math.floor(COLS / 2);
            const startY = Math.floor(ROWS / 2);
            snake = [{ x: startX, y: startY }];
            board[startY][startX] = 'snake';
        }

        // 生成食物
        function generateFood() {
            let x, y;
            do {
                x = Math.floor(Math.random() * COLS);
                y = Math.floor(Math.random() * ROWS);
            } while (board[y][x] === 'snake');
            
            food = { x, y };
            board[y][x] = 'food';
        }

        // 绘制游戏板
        function drawBoard() {
            gameGrid.innerHTML = '';
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (board[r][c] === 'snake') {
                        cell.classList.add('snake');
                    } else if (board[r][c] === 'food') {
                        cell.classList.add('food');
                    } else {
                        cell.classList.add('empty');
                    }
                    gameGrid.appendChild(cell);
                }
            }
        }

        // 移动蛇
        function moveSnake() {
            const head = snake[0];
            let newHead = { ...head };

            // 根据方向移动
            switch (direction) {
                case 'up':
                    newHead.y--;
                    break;
                case 'down':
                    newHead.y++;
                    break;
                case 'left':
                    newHead.x--;
                    break;
                case 'right':
                    newHead.x++;
                    break;
            }

            // 检查碰撞
            if (checkCollision(newHead)) {
                gameOver();
                return;
            }

            // 移动蛇
            snake.unshift(newHead);
            board[newHead.y][newHead.x] = 'snake';

            // 检查是否吃到食物
            if (newHead.x === food.x && newHead.y === food.y) {
                score += 10;
                length++;
                scoreElement.textContent = score;
                lengthElement.textContent = length;
                generateFood();
                // 提高游戏速度
                if (gameSpeed > 50) {
                    gameSpeed -= 5;
                    clearInterval(gameInterval);
                    gameInterval = setInterval(moveSnake, gameSpeed);
                }
            } else {
                // 移除蛇尾
                const tail = snake.pop();
                board[tail.y][tail.x] = null;
            }

            drawBoard();
        }

        // 检查碰撞
        function checkCollision(head) {
            // 墙壁碰撞
            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
                return true;
            }

            // 自身碰撞
            return snake.some(segment => segment.x === head.x && segment.y === head.y);
        }

        // 游戏主循环
        function gameLoop() {
            if (!gamePaused) {
                moveSnake();
            }
        }

        // 开始游戏
        function startGame() {
            initBoard();
            initSnake();
            generateFood();
            score = 0;
            length = 1;
            gameSpeed = 150;
            scoreElement.textContent = score;
            lengthElement.textContent = length;
            direction = 'right';

            drawBoard();
            gameRunning = true;
            gamePaused = false;
            gameInterval = setInterval(gameLoop, gameSpeed);

            startBtn.textContent = '正在游戏';
            startBtn.disabled = true;
            pauseBtn.disabled = false;
        }

        // 暂停/继续游戏
        function togglePause() {
            if (!gameRunning) return;

            gamePaused = !gamePaused;
            pauseBtn.textContent = gamePaused ? '继续' : '暂停';
        }

        // 游戏结束
        function gameOver() {
            gameRunning = false;
            clearInterval(gameInterval);
            finalScoreElement.textContent = score;
            finalLengthElement.textContent = length;
            gameOverElement.classList.remove('hidden');
            startBtn.textContent = '开始游戏';
            startBtn.disabled = false;
            pauseBtn.disabled = true;
        }

        // 重新开始
        function restartGame() {
            gameOverElement.classList.add('hidden');
            startGame();
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;

            switch (e.key) {
                case 'ArrowUp':
                    e.preventDefault();
                    if (direction !== 'down') direction = 'up';
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    if (direction !== 'up') direction = 'down';
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    if (direction !== 'right') direction = 'left';
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    if (direction !== 'left') direction = 'right';
                    break;
                case 'p':
                case 'P':
                    e.preventDefault();
                    togglePause();
                    break;
            }
        });

        // 按钮事件
        startBtn.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', togglePause);
        resetBtn.addEventListener('click', () => {
            if (confirm('确定要重新开始吗？')) {
                restartGame();
            }
        });
        restartBtn.addEventListener('click', restartGame);

        // 初始化游戏板显示
        initBoard();
        drawBoard();
    </script>
</body>
</html>
