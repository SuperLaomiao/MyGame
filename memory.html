<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记忆翻牌游戏</title>
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2768422999984116"
        crossorigin="anonymous"></script>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 根变量定义 */
        :root {
            --primary-color: #00ffff;
            --secondary-color: #ff00ff;
            --accent-color: #ffff00;
            --bg-color: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #ffffff;
            --shadow: 0 4px 20px rgba(0, 255, 255, 0.3);
            --border-radius: 15px;
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #1a1a1a 50%, var(--bg-color) 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 背景动画 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(0, 255, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 0, 255, 0.1) 0%, transparent 50%);
            z-index: -1;
            animation: backgroundPulse 10s ease-in-out infinite alternate;
        }

        @keyframes backgroundPulse {
            0% { opacity: 0.3; }
            100% { opacity: 0.6; }
        }

        /* 游戏容器 */
        .game-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 255, 255, 0.3);
            position: relative;
            max-width: 800px;
            width: 100%;
            margin: 20px;
        }

        /* 游戏标题 */
        .game-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            text-align: center;
            margin-bottom: 20px;
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            0% { filter: brightness(1); }
            100% { filter: brightness(1.3); }
        }

        /* 游戏控制区域 */
        .game-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: var(--border-radius);
            border: 1px solid rgba(0, 255, 255, 0.2);
            flex-wrap: wrap;
        }

        .difficulty-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .difficulty-btn {
            background: var(--card-bg);
            color: var(--text-color);
            border: 1px solid rgba(0, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow);
            font-weight: 500;
        }

        .difficulty-btn:hover,
        .difficulty-btn.active {
            background: var(--primary-color);
            color: var(--bg-color);
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0, 255, 255, 0.5);
        }

        .game-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: var(--bg-color);
            border: none;
            padding: 10px 20px;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-weight: 700;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.4);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(0, 255, 255, 0.6);
        }

        /* 游戏信息 */
        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: var(--border-radius);
            border: 1px solid rgba(0, 255, 255, 0.2);
            flex-wrap: wrap;
            gap: 20px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .info-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        /* 游戏网格 */
        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
            justify-items: center;
        }

        /* 游戏卡片 */
        .card {
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            border-radius: var(--border-radius);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            perspective: 1000px;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(0, 255, 255, 0.6);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.matched {
            background: var(--accent-color);
            color: var(--bg-color);
            cursor: default;
            pointer-events: none;
            transform: scale(0.95);
            transition: all 0.5s ease;
        }

        .card-content {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            backface-visibility: hidden;
            border-radius: var(--border-radius);
        }

        .card-back {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: transparent;
            font-size: 0;
        }

        .card-front {
            background: var(--bg-color);
            color: var(--primary-color);
            transform: rotateY(180deg);
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        /* 游戏结束界面 */
        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-bg);
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 50px rgba(0, 0, 255, 0.5);
            border: 1px solid rgba(0, 255, 255, 0.3);
            z-index: 1000;
            text-align: center;
            display: none;
        }

        .game-over.active {
            display: block;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .game-over h2 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            margin-bottom: 20px;
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        .game-over p {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .game-board {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }

            .card {
                width: 70px;
                height: 70px;
                font-size: 1.5rem;
            }

            .game-title {
                font-size: 2rem;
            }

            .difficulty-selector,
            .game-buttons {
                flex-direction: column;
                width: 100%;
            }

            .difficulty-btn,
            .btn {
                width: 100%;
            }
        }

        /* 加载动画 */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            font-size: 1.2rem;
            color: var(--text-color);
        }

        /* 返回按钮 */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--card-bg);
            color: var(--text-color);
            border: 1px solid rgba(0, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow);
            font-weight: 500;
        }

        .back-btn:hover {
            background: var(--primary-color);
            color: var(--bg-color);
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <button class="back-btn" onclick="window.location.href='index.html'">← 回到主页</button>
        <h1 class="game-title">🧠 记忆翻牌</h1>
        
        <div class="game-controls">
            <div class="difficulty-selector">
                <button class="difficulty-btn active" data-difficulty="easy">简单</button>
                <button class="difficulty-btn" data-difficulty="medium">中等</button>
                <button class="difficulty-btn" data-difficulty="hard">困难</button>
            </div>
            <div class="game-buttons">
                <button class="btn" id="newGameBtn">新游戏</button>
                <button class="btn" id="pauseBtn">暂停</button>
            </div>
        </div>

        <div class="game-info">
            <div class="info-item">
                <span class="info-label">时间</span>
                <span class="info-value" id="time">00:00</span>
            </div>
            <div class="info-item">
                <span class="info-label">步数</span>
                <span class="info-value" id="moves">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">匹配</span>
                <span class="info-value" id="matches">0</span>
            </div>
        </div>

        <div class="game-board" id="gameBoard"></div>

        <div class="game-over" id="gameOver">
            <h2 id="gameOverTitle">恭喜获胜！</h2>
            <p id="gameOverMessage">你完成了游戏！</p>
            <p>时间: <span id="finalTime">00:00</span></p>
            <p>步数: <span id="finalMoves">0</span></p>
            <p>匹配: <span id="finalMatches">0</span></p>
            <button class="btn" id="restartBtn">再玩一次</button>
        </div>
    </div>

    <script>
        // 记忆翻牌游戏实现
        const DIFFICULTIES = {
            easy: { rows: 4, cols: 4, pairs: 8 },
            medium: { rows: 6, cols: 6, pairs: 18 },
            hard: { rows: 8, cols: 8, pairs: 32 }
        };

        const SYMBOLS = ['🎈', '🎉', '🎊', '🎁', '🎀', '💝', '💖', '💗', '💓', '💞', '💕', '💟', '💜', '💛', '💚', '💙', '❤️', '🧡', '🍓', '🍒'];

        let gameBoard = [];
        let revealedCards = [];
        let matchedPairs = 0;
        let currentDifficulty = 'easy';
        let moves = 0;
        let timer = 0;
        let timerInterval;
        let gameOver = false;
        let gamePaused = false;

        const gameBoardElement = document.getElementById('gameBoard');
        const timeElement = document.getElementById('time');
        const movesElement = document.getElementById('moves');
        const matchesElement = document.getElementById('matches');
        const newGameBtn = document.getElementById('newGameBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const gameOverElement = document.getElementById('gameOver');
        const gameOverTitle = document.getElementById('gameOverTitle');
        const gameOverMessage = document.getElementById('gameOverMessage');
        const finalTimeElement = document.getElementById('finalTime');
        const finalMovesElement = document.getElementById('finalMoves');
        const finalMatchesElement = document.getElementById('finalMatches');
        const restartBtn = document.getElementById('restartBtn');
        const difficultyBtns = document.querySelectorAll('.difficulty-btn');

        // 初始化游戏
        function initGame(difficulty = 'easy') {
            currentDifficulty = difficulty;
            const config = DIFFICULTIES[difficulty];
            
            // 重置游戏状态
            clearInterval(timerInterval);
            moves = 0;
            timer = 0;
            matchedPairs = 0;
            revealedCards = [];
            gameOver = false;
            gamePaused = false;
            
            // 初始化游戏板
            initGameBoard(config);
            
            // 更新 UI
            movesElement.textContent = moves;
            matchesElement.textContent = matchedPairs;
            timeElement.textContent = '00:00';
            gameOverElement.classList.remove('active');
            
            // 开始计时器
            timerInterval = setInterval(() => {
                if (!gamePaused) {
                    timer++;
                    timeElement.textContent = formatTime(timer);
                }
            }, 1000);
        }

        // 格式化时间
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // 初始化游戏板
        function initGameBoard(config) {
            // 生成游戏板内容
            gameBoard = [];
            const selectedSymbols = SYMBOLS.slice(0, config.pairs);
            const board = [...selectedSymbols, ...selectedSymbols];
            
            // 随机洗牌
            for (let i = board.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [board[i], board[j]] = [board[j], board[i]];
            }
            
            gameBoard = board;
            
            // 渲染游戏板
            renderGameBoard(config);
        }

        // 渲染游戏板
        function renderGameBoard(config) {
            gameBoardElement.innerHTML = '';
            gameBoardElement.style.gridTemplateColumns = `repeat(${config.cols}, 1fr)`;
            
            for (let i = 0; i < gameBoard.length; i++) {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = i;
                
                const cardContent = document.createElement('div');
                cardContent.className = 'card-content card-back';
                
                const cardSymbol = document.createElement('div');
                cardSymbol.className = 'card-content card-front';
                cardSymbol.textContent = gameBoard[i];
                
                card.appendChild(cardContent);
                card.appendChild(cardSymbol);
                
                card.addEventListener('click', () => flipCard(i));
                
                gameBoardElement.appendChild(card);
            }
        }

        // 翻转卡片
        function flipCard(index) {
            if (gameOver || gamePaused) return;
            if (revealedCards.length >= 2) return;
            if (document.querySelector(`[data-index="${index}"].flipped`)) return;
            
            const cardElement = document.querySelector(`[data-index="${index}"]`);
            cardElement.classList.add('flipped');
            
            revealedCards.push({ index, symbol: gameBoard[index] });
            
            // 检查是否有两张卡片翻转
            if (revealedCards.length === 2) {
                moves++;
                movesElement.textContent = moves;
                setTimeout(checkMatch, 1000);
            }
        }

        // 检查是否匹配
        function checkMatch() {
            const [card1, card2] = revealedCards;
            
            if (card1.symbol === card2.symbol) {
                // 匹配成功
                document.querySelector(`[data-index="${card1.index}"]`).classList.add('matched');
                document.querySelector(`[data-index="${card2.index}"]`).classList.add('matched');
                matchedPairs++;
                matchesElement.textContent = matchedPairs;
                
                // 检查是否完成游戏
                if (matchedPairs === DIFFICULTIES[currentDifficulty].pairs) {
                    gameOver = true;
                    clearInterval(timerInterval);
                    showGameOver('你完成了游戏！');
                }
            } else {
                // 匹配失败
                document.querySelector(`[data-index="${card1.index}"]`).classList.remove('flipped');
                document.querySelector(`[data-index="${card2.index}"]`).classList.remove('flipped');
            }
            
            revealedCards = [];
        }

        // 显示游戏结束信息
        function showGameOver(message) {
            gameOverTitle.textContent = '恭喜获胜！';
            gameOverMessage.textContent = message;
            finalTimeElement.textContent = formatTime(timer);
            finalMovesElement.textContent = moves;
            finalMatchesElement.textContent = matchedPairs;
            gameOverElement.classList.add('active');
        }

        // 暂停/继续游戏
        function togglePause() {
            if (gameOver) return;
            
            gamePaused = !gamePaused;
            pauseBtn.textContent = gamePaused ? '继续' : '暂停';
        }

        // 事件监听器
        newGameBtn.addEventListener('click', () => initGame(currentDifficulty));
        pauseBtn.addEventListener('click', togglePause);
        restartBtn.addEventListener('click', () => {
            gameOverElement.classList.remove('active');
            initGame(currentDifficulty);
        });

        difficultyBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                difficultyBtns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentDifficulty = e.target.dataset.difficulty;
                initGame(currentDifficulty);
            });
        });

        // 初始化游戏
        initGame();
    </script>
</body>
</html>
