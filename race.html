<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛车游戏</title>
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2768422999984116"
        crossorigin="anonymous"></script>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 根变量定义 */
        :root {
            --primary-color: #00ffff;
            --secondary-color: #ff00ff;
            --accent-color: #ffff00;
            --bg-color: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #ffffff;
            --shadow: 0 4px 20px rgba(0, 255, 255, 0.3);
            --border-radius: 15px;
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #1a1a1a 50%, var(--bg-color) 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 背景动画 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(0, 255, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 0, 255, 0.1) 0%, transparent 50%);
            z-index: -1;
            animation: backgroundPulse 10s ease-in-out infinite alternate;
        }

        @keyframes backgroundPulse {
            0% { opacity: 0.3; }
            100% { opacity: 0.6; }
        }

        /* 游戏容器 */
        .game-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 255, 255, 0.3);
            position: relative;
            max-width: 1000px;
            width: 100%;
            margin: 20px;
        }

        /* 游戏标题 */
        .game-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            text-align: center;
            margin-bottom: 20px;
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            0% { filter: brightness(1); }
            100% { filter: brightness(1.3); }
        }

        /* 游戏控制区域 */
        .game-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: var(--border-radius);
            border: 1px solid rgba(0, 255, 255, 0.2);
            flex-wrap: wrap;
        }

        .game-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: var(--bg-color);
            border: none;
            padding: 10px 20px;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-weight: 700;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.4);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(0, 255, 255, 0.6);
        }

        /* 游戏信息 */
        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: var(--border-radius);
            border: 1px solid rgba(0, 255, 255, 0.2);
            flex-wrap: wrap;
            gap: 20px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .info-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        /* 游戏板 */
        .game-board {
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 255, 255, 0.3);
            position: relative;
            height: 600px;
            margin-bottom: 30px;
        }

        /* 道路 */
        .road {
            position: absolute;
            width: 400px;
            height: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(45deg, #333 0%, #555 50%, #333 100%);
            overflow: hidden;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .lane {
            position: absolute;
            width: 133px;
            height: 100%;
            border-right: 2px dashed rgba(255, 255, 255, 0.6);
            top: 0;
            animation: laneMove 0.5s linear infinite;
        }

        @keyframes laneMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(20px); }
        }

        /* 玩家汽车 */
        .player-car {
            position: absolute;
            width: 40px;
            height: 60px;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            border-radius: var(--border-radius);
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 255, 255, 0.3);
            font-size: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .player-car:hover {
            transform: translateX(-50%) scale(1.1);
            box-shadow: 0 6px 25px rgba(0, 255, 255, 0.6);
        }

        /* 敌人汽车 */
        .enemy-car {
            position: absolute;
            width: 40px;
            height: 60px;
            border-radius: var(--border-radius);
            top: -60px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 255, 255, 0.3);
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .enemy-car:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 25px rgba(255, 0, 255, 0.6);
        }

        /* 游戏结束界面 */
        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-bg);
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 50px rgba(0, 0, 255, 0.5);
            border: 1px solid rgba(0, 255, 255, 0.3);
            z-index: 1000;
            text-align: center;
            display: none;
        }

        .game-over.active {
            display: block;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .game-over h2 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            margin-bottom: 20px;
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        .game-over p {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .game-board {
                height: 400px;
            }

            .player-car {
                width: 30px;
                height: 50px;
                font-size: 1.5rem;
            }

            .enemy-car {
                width: 30px;
                height: 50px;
                font-size: 1rem;
            }

            .game-title {
                font-size: 2rem;
            }

            .game-buttons {
                flex-direction: column;
                width: 100%;
            }

            .btn {
                width: 100%;
            }
        }

        /* 加载动画 */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            font-size: 1.2rem;
            color: var(--text-color);
        }

        /* 返回按钮 */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--card-bg);
            color: var(--text-color);
            border: 1px solid rgba(0, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow);
            font-weight: 500;
        }

        .back-btn:hover {
            background: var(--primary-color);
            color: var(--bg-color);
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <button class="back-btn" onclick="window.location.href='index.html'">← 回到主页</button>
        <h1 class="game-title">🏎️ 赛车游戏</h1>
        
        <div class="game-controls">
            <div class="game-buttons">
                <button class="btn" id="newGameBtn">新游戏</button>
                <button class="btn" id="pauseBtn">暂停</button>
            </div>
        </div>

        <div class="game-info">
            <div class="info-item">
                <span class="info-label">得分</span>
                <span class="info-value" id="score">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">生命</span>
                <span class="info-value" id="lives">3</span>
            </div>
            <div class="info-item">
                <span class="info-label">速度</span>
                <span class="info-value" id="speed">0</span>
            </div>
        </div>

        <div class="game-board" id="gameBoard">
            <div class="road" id="road">
                <div class="lane" style="left: 0;"></div>
                <div class="lane" style="left: 133px;"></div>
                <div class="lane" style="left: 266px;"></div>
                <div class="player-car" id="playerCar">🚗</div>
            </div>
        </div>

        <div class="game-over" id="gameOver">
            <h2 id="gameOverTitle">游戏结束!</h2>
            <p id="gameOverMessage">很遗憾，你发生了碰撞！</p>
            <p>得分: <span id="finalScore">0</span></p>
            <p>最高速度: <span id="finalSpeed">0</span>km/h</p>
            <button class="btn" id="restartBtn">再玩一次</button>
        </div>
    </div>

    <script>
        // 赛车游戏实现
        const LANES = [130, 265, 400]; // 每个车道的 X 坐标
        const ENEMY_COLORS = ['#00ff00', '#0000ff', '#ffff00', '#ffa500'];
        const ENEMY_SPEEDS = [2, 3, 4, 5];

        let player = { x: LANES[1], y: 320, width: 40, height: 60, lane: 1, speed: 8 };
        let enemyCars = [];
        let score = 0;
        let lives = 3;
        let speed = 0;
        let maxSpeed = 0;
        let roadOffset = 0;
        let gameOver = false;
        let gamePaused = false;
        let animationId;
        let enemySpawnTimer;
        let speedTimer;

        const gameBoardElement = document.getElementById('gameBoard');
        const roadElement = document.getElementById('road');
        const playerCarElement = document.getElementById('playerCar');
        const scoreElement = document.getElementById('score');
        const livesElement = document.getElementById('lives');
        const speedElement = document.getElementById('speed');
        const newGameBtn = document.getElementById('newGameBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const gameOverElement = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('finalScore');
        const finalSpeedElement = document.getElementById('finalSpeed');
        const restartBtn = document.getElementById('restartBtn');

        // 初始化游戏
        function initGame() {
            // 重置游戏状态
            score = 0;
            lives = 3;
            speed = 0;
            maxSpeed = 0;
            roadOffset = 0;
            enemyCars = [];
            gameOver = false;
            gamePaused = false;
            
            // 重置玩家位置
            player.x = LANES[1];
            player.y = 320;
            player.lane = 1;
            
            // 更新 UI
            scoreElement.textContent = score;
            livesElement.textContent = lives;
            speedElement.textContent = speed;
            finalSpeedElement.textContent = maxSpeed;
            gameOverElement.classList.remove('active');
            
            // 开始游戏循环
            startGameLoop();
            startEnemySpawn();
            startSpeedIncrease();
        }

        // 游戏循环
        function startGameLoop() {
            const loop = () => {
                if (gameOver || gamePaused) {
                    animationId = requestAnimationFrame(loop);
                    return;
                }
                
                update();
                draw();
                
                animationId = requestAnimationFrame(loop);
            };
            loop();
        }

        // 更新游戏状态
        function update() {
            // 更新道路动画
            roadOffset += speed / 10;
            if (roadOffset > 100) {
                roadOffset = 0;
            }
            
            // 更新敌人汽车
            enemyCars.forEach((car, index) => {
                car.y += car.speed;
                
                // 检查是否超出边界
                if (car.y > 400) {
                    enemyCars.splice(index, 1);
                    score += 10;
                    scoreElement.textContent = score;
                }
                
                // 检查碰撞
                if (checkCollision(player, car)) {
                    lives--;
                    livesElement.textContent = lives;
                    
                    if (lives === 0) {
                        gameOver = true;
                        clearInterval(enemySpawnTimer);
                        clearInterval(speedTimer);
                        clearInterval(animationId);
                        showGameOver();
                    } else {
                        enemyCars.splice(index, 1);
                        // 重置玩家位置
                        player.x = LANES[1];
                        player.y = 320;
                        player.lane = 1;
                    }
                }
            });
        }

        // 检查碰撞
        function checkCollision(car1, car2) {
            return (
                car1.x < car2.x + car2.width &&
                car1.x + car1.width > car2.x &&
                car1.y < car2.y + car2.height &&
                car1.y + car1.height > car2.y
            );
        }

        // 绘制游戏元素
        function draw() {
            // 绘制玩家汽车
            playerCarElement.style.left = player.x + 'px';
            playerCarElement.style.top = player.y + 'px';
            playerCarElement.style.width = player.width + 'px';
            playerCarElement.style.height = player.height + 'px';
            
            // 绘制敌人汽车
            document.querySelectorAll('.enemy-car').forEach(el => el.remove());
            enemyCars.forEach(car => {
                const enemyElement = document.createElement('div');
                enemyElement.className = 'enemy-car';
                enemyElement.style.left = car.x + 'px';
                enemyElement.style.top = car.y + 'px';
                enemyElement.style.width = car.width + 'px';
                enemyElement.style.height = car.height + 'px';
                enemyElement.style.backgroundColor = car.color;
                enemyElement.textContent = '🚙';
                roadElement.appendChild(enemyElement);
            });
        }

        // 生成敌人汽车
        function spawnEnemy() {
            if (gameOver || gamePaused) return;
            
            const lane = Math.floor(Math.random() * LANES.length);
            const color = ENEMY_COLORS[Math.floor(Math.random() * ENEMY_COLORS.length)];
            const enemySpeed = ENEMY_SPEEDS[Math.floor(Math.random() * ENEMY_SPEEDS.length)];
            
            const car = {
                x: LANES[lane],
                y: -60,
                width: 40,
                height: 60,
                lane: lane,
                speed: enemySpeed,
                color: color
            };
            
            enemyCars.push(car);
        }

        // 开始生成敌人
        function startEnemySpawn() {
            enemySpawnTimer = setInterval(spawnEnemy, 2000);
        }

        // 增加速度
        function increaseSpeed() {
            if (gameOver || gamePaused) return;
            
            speed += 1;
            speedElement.textContent = speed;
            
            if (speed > maxSpeed) {
                maxSpeed = speed;
                finalSpeedElement.textContent = maxSpeed;
            }
        }

        // 开始速度增加
        function startSpeedIncrease() {
            speedTimer = setInterval(increaseSpeed, 1000);
        }

        // 移动车道
        function moveLane(direction) {
            if (gameOver || gamePaused) return;
            
            const newLane = player.lane + direction;
            
            if (newLane >= 0 && newLane < LANES.length) {
                player.lane = newLane;
                player.x = LANES[newLane];
            }
        }

        // 显示游戏结束信息
        function showGameOver() {
            finalScoreElement.textContent = score;
            gameOverElement.classList.add('active');
        }

        // 事件监听器
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                moveLane(-1);
            } else if (e.key === 'ArrowRight') {
                moveLane(1);
            }
        });

        newGameBtn.addEventListener('click', initGame);
        pauseBtn.addEventListener('click', () => {
            gamePaused = !gamePaused;
            pauseBtn.textContent = gamePaused ? '继续' : '暂停';
        });
        restartBtn.addEventListener('click', () => {
            gameOverElement.classList.remove('active');
            initGame();
        });

        // 初始化游戏
        initGame();
    </script>
</body>
</html>
