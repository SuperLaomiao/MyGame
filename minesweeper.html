<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫雷游戏</title>
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2768422999984116"
        crossorigin="anonymous"></script>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 根变量定义 */
        :root {
            --primary-color: #00ffff;
            --secondary-color: #ff00ff;
            --accent-color: #ffff00;
            --bg-color: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #ffffff;
            --shadow: 0 4px 20px rgba(0, 255, 255, 0.3);
            --border-radius: 15px;
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #1a1a1a 50%, var(--bg-color) 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 背景动画 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(0, 255, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 0, 255, 0.1) 0%, transparent 50%);
            z-index: -1;
            animation: backgroundPulse 10s ease-in-out infinite alternate;
        }

        @keyframes backgroundPulse {
            0% { opacity: 0.3; }
            100% { opacity: 0.6; }
        }

        /* 游戏容器 */
        .game-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 255, 255, 0.3);
            position: relative;
            max-width: 800px;
            width: 100%;
            margin: 20px;
        }

        /* 游戏标题 */
        .game-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            text-align: center;
            margin-bottom: 20px;
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            0% { filter: brightness(1); }
            100% { filter: brightness(1.3); }
        }

        /* 游戏控制区域 */
        .game-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: var(--border-radius);
            border: 1px solid rgba(0, 255, 255, 0.2);
            flex-wrap: wrap;
        }

        .difficulty-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .difficulty-btn {
            background: var(--card-bg);
            color: var(--text-color);
            border: 1px solid rgba(0, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow);
            font-weight: 500;
        }

        .difficulty-btn:hover,
        .difficulty-btn.active {
            background: var(--primary-color);
            color: var(--bg-color);
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0, 255, 255, 0.5);
        }

        .game-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: var(--bg-color);
            border: none;
            padding: 10px 20px;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-weight: 700;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.4);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(0, 255, 255, 0.6);
        }

        /* 游戏信息 */
        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: var(--border-radius);
            border: 1px solid rgba(0, 255, 255, 0.2);
            flex-wrap: wrap;
            gap: 20px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .info-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        /* 游戏网格 */
        .game-board {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 5px;
            margin-bottom: 30px;
            justify-items: center;
        }

        /* 游戏格子 */
        .cell {
            width: 40px;
            height: 40px;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            border-radius: var(--border-radius);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            border: 1px solid rgba(0, 255, 255, 0.3);
            font-weight: 700;
        }

        .cell:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(0, 255, 255, 0.6);
        }

        .cell.revealed {
            background: var(--bg-color);
            color: var(--primary-color);
            cursor: default;
            pointer-events: none;
        }

        .cell.flagged {
            background: var(--accent-color);
            color: var(--bg-color);
            transform: scale(1.05);
        }

        .cell.mine {
            background: var(--secondary-color);
            color: var(--text-color);
            transform: scale(0.95);
            transition: all 0.5s ease;
        }

        /* 游戏结束界面 */
        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-bg);
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 50px rgba(0, 0, 255, 0.5);
            border: 1px solid rgba(0, 255, 255, 0.3);
            z-index: 1000;
            text-align: center;
            display: none;
        }

        .game-over.active {
            display: block;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .game-over h2 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            margin-bottom: 20px;
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        .game-over p {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .game-board {
                grid-template-columns: repeat(10, 1fr);
                gap: 3px;
            }

            .cell {
                width: 35px;
                height: 35px;
                font-size: 1rem;
            }

            .game-title {
                font-size: 2rem;
            }

            .difficulty-selector,
            .game-buttons {
                flex-direction: column;
                width: 100%;
            }

            .difficulty-btn,
            .btn {
                width: 100%;
            }
        }

        /* 加载动画 */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            font-size: 1.2rem;
            color: var(--text-color);
        }

        /* 返回按钮 */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--card-bg);
            color: var(--text-color);
            border: 1px solid rgba(0, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow);
            font-weight: 500;
        }

        .back-btn:hover {
            background: var(--primary-color);
            color: var(--bg-color);
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <button class="back-btn" onclick="window.location.href='index.html'">← 回到主页</button>
        <h1 class="game-title">💣 扫雷游戏</h1>
        
        <div class="game-controls">
            <div class="difficulty-selector">
                <button class="difficulty-btn active" data-difficulty="easy">初级</button>
                <button class="difficulty-btn" data-difficulty="medium">中级</button>
                <button class="difficulty-btn" data-difficulty="hard">高级</button>
            </div>
            <div class="game-buttons">
                <button class="btn" id="newGameBtn">新游戏</button>
                <button class="btn" id="pauseBtn">暂停</button>
            </div>
        </div>

        <div class="game-info">
            <div class="info-item">
                <span class="info-label">剩余地雷</span>
                <span class="info-value" id="minesLeft">10</span>
            </div>
            <div class="info-item">
                <span class="info-label">时间</span>
                <span class="info-value" id="time">00:00</span>
            </div>
            <div class="info-item">
                <span class="info-label">难度</span>
                <span class="info-value" id="difficulty">初级</span>
            </div>
        </div>

        <div class="game-board" id="gameBoard"></div>

        <div class="game-over" id="gameOver">
            <h2 id="gameOverTitle">游戏结束!</h2>
            <p id="gameOverMessage">很遗憾，你踩到了地雷！</p>
            <p>时间: <span id="finalTime">00:00</span></p>
            <p>地雷: <span id="finalMinesLeft">10</span></p>
            <p>难度: <span id="finalDifficulty">初级</span></p>
            <button class="btn" id="restartBtn">再玩一次</button>
        </div>
    </div>

    <script>
        // 扫雷游戏实现
        const DIFFICULTIES = {
            easy: { rows: 9, cols: 9, mines: 10 },
            medium: { rows: 16, cols: 16, mines: 40 },
            hard: { rows: 16, cols: 30, mines: 99 }
        };

        let gameBoard = [];
        let revealedBoard = [];
        let flaggedBoard = [];
        let currentDifficulty = 'easy';
        let minesLeft = 10;
        let timer = 0;
        let timerInterval;
        let gameOver = false;
        let gamePaused = false;

        const gameBoardElement = document.getElementById('gameBoard');
        const minesLeftElement = document.getElementById('minesLeft');
        const timeElement = document.getElementById('time');
        const difficultyElement = document.getElementById('difficulty');
        const newGameBtn = document.getElementById('newGameBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const gameOverElement = document.getElementById('gameOver');
        const gameOverTitle = document.getElementById('gameOverTitle');
        const gameOverMessage = document.getElementById('gameOverMessage');
        const finalTimeElement = document.getElementById('finalTime');
        const finalMinesLeftElement = document.getElementById('finalMinesLeft');
        const finalDifficultyElement = document.getElementById('finalDifficulty');
        const restartBtn = document.getElementById('restartBtn');
        const difficultyBtns = document.querySelectorAll('.difficulty-btn');

        // 初始化游戏
        function initGame(difficulty = 'easy') {
            currentDifficulty = difficulty;
            const config = DIFFICULTIES[difficulty];
            
            // 重置游戏状态
            clearInterval(timerInterval);
            timer = 0;
            minesLeft = config.mines;
            gameOver = false;
            gamePaused = false;
            
            // 初始化游戏板
            initGameBoard(config);
            
            // 更新 UI
            minesLeftElement.textContent = minesLeft;
            timeElement.textContent = '00:00';
            difficultyElement.textContent = ['初级', '中级', '高级'][Object.keys(DIFFICULTIES).indexOf(difficulty)];
            gameOverElement.classList.remove('active');
            
            // 开始计时器
            timerInterval = setInterval(() => {
                if (!gamePaused) {
                    timer++;
                    timeElement.textContent = formatTime(timer);
                }
            }, 1000);
        }

        // 格式化时间
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // 初始化游戏板
        function initGameBoard(config) {
            // 生成游戏板内容
            gameBoard = [];
            revealedBoard = [];
            flaggedBoard = [];
            
            for (let i = 0; i < config.rows; i++) {
                gameBoard[i] = [];
                revealedBoard[i] = [];
                flaggedBoard[i] = [];
                for (let j = 0; j < config.cols; j++) {
                    gameBoard[i][j] = 0;
                    revealedBoard[i][j] = false;
                    flaggedBoard[i][j] = false;
                }
            }
            
            // 放置地雷
            placeMines(config);
            
            // 计算周围地雷数量
            calculateAdjacentMines(config);
            
            // 渲染游戏板
            renderGameBoard(config);
        }

        // 放置地雷
        function placeMines(config) {
            let minesPlaced = 0;
            while (minesPlaced < config.mines) {
                const row = Math.floor(Math.random() * config.rows);
                const col = Math.floor(Math.random() * config.cols);
                
                if (gameBoard[row][col] !== -1) {
                    gameBoard[row][col] = -1;
                    minesPlaced++;
                }
            }
        }

        // 计算周围地雷数量
        function calculateAdjacentMines(config) {
            for (let i = 0; i < config.rows; i++) {
                for (let j = 0; j < config.cols; j++) {
                    if (gameBoard[i][j] !== -1) {
                        let count = 0;
                        for (let dx = -1; dx <= 1; dx++) {
                            for (let dy = -1; dy <= 1; dy++) {
                                const newRow = i + dx;
                                const newCol = j + dy;
                                if (newRow >= 0 && newRow < config.rows && newCol >= 0 && newCol < config.cols) {
                                    if (gameBoard[newRow][newCol] === -1) {
                                        count++;
                                    }
                                }
                            }
                        }
                        gameBoard[i][j] = count;
                    }
                }
            }
        }

        // 渲染游戏板
        function renderGameBoard(config) {
            gameBoardElement.innerHTML = '';
            
            for (let i = 0; i < config.rows; i++) {
                for (let j = 0; j < config.cols; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = i;
                    cell.dataset.col = j;
                    cell.addEventListener('click', () => revealCell(i, j));
                    cell.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        flagCell(i, j);
                    });
                    gameBoardElement.appendChild(cell);
                }
            }
        }

        // 揭示格子
        function revealCell(row, col) {
            if (gameOver || gamePaused || revealedBoard[row][col] || flaggedBoard[row][col]) {
                return;
            }
            
            revealedBoard[row][col] = true;
            const cell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
            cell.classList.add('revealed');
            
            if (gameBoard[row][col] === -1) {
                // 踩到地雷
                cell.classList.add('mine');
                gameOver = true;
                clearInterval(timerInterval);
                revealAllMines();
                showGameOver('很遗憾，你踩到了地雷！');
            } else if (gameBoard[row][col] === 0) {
                // 揭示周围格子
                revealNeighbors(row, col);
            } else {
                // 显示数字
                cell.textContent = gameBoard[row][col];
            }
            
            // 检查是否胜利
            checkWin();
        }

        // 揭示邻居格子
        function revealNeighbors(row, col) {
            const config = DIFFICULTIES[currentDifficulty];
            
            for (let dx = -1; dx <= 1; dx++) {
                for (let dy = -1; dy <= 1; dy++) {
                    const newRow = row + dx;
                    const newCol = col + dy;
                    if (newRow >= 0 && newRow < config.rows && newCol >= 0 && newCol < config.cols) {
                        if (!revealedBoard[newRow][newCol] && !flaggedBoard[newRow][newCol]) {
                            revealCell(newRow, newCol);
                        }
                    }
                }
            }
        }

        // 标记格子
        function flagCell(row, col) {
            if (gameOver || gamePaused || revealedBoard[row][col]) {
                return;
            }
            
            flaggedBoard[row][col] = !flaggedBoard[row][col];
            const cell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
            
            if (flaggedBoard[row][col]) {
                cell.classList.add('flagged');
                minesLeft--;
            } else {
                cell.classList.remove('flagged');
                minesLeft++;
            }
            
            minesLeftElement.textContent = minesLeft;
        }

        // 揭示所有地雷
        function revealAllMines() {
            const config = DIFFICULTIES[currentDifficulty];
            for (let i = 0; i < config.rows; i++) {
                for (let j = 0; j < config.cols; j++) {
                    if (gameBoard[i][j] === -1 && !revealedBoard[i][j]) {
                        const cell = document.querySelector(`[data-row="${i}"][data-col="${j}"]`);
                        cell.classList.add('mine');
                        cell.textContent = '💣';
                    }
                }
            }
        }

        // 检查是否胜利
        function checkWin() {
            const config = DIFFICULTIES[currentDifficulty];
            let revealedCount = 0;
            for (let i = 0; i < config.rows; i++) {
                for (let j = 0; j < config.cols; j++) {
                    if (revealedBoard[i][j]) {
                        revealedCount++;
                    }
                }
            }
            
            if (revealedCount === config.rows * config.cols - config.mines) {
                gameOver = true;
                clearInterval(timerInterval);
                showGameOver('恭喜获胜！');
            }
        }

        // 显示游戏结束信息
        function showGameOver(message) {
            gameOverTitle.textContent = message.includes('地雷') ? '游戏结束!' : '恭喜获胜！';
            gameOverMessage.textContent = message;
            finalTimeElement.textContent = formatTime(timer);
            finalMinesLeftElement.textContent = minesLeft;
            finalDifficultyElement.textContent = ['初级', '中级', '高级'][Object.keys(DIFFICULTIES).indexOf(currentDifficulty)];
            gameOverElement.classList.add('active');
        }

        // 暂停/继续游戏
        function togglePause() {
            if (gameOver) return;
            
            gamePaused = !gamePaused;
            pauseBtn.textContent = gamePaused ? '继续' : '暂停';
        }

        // 事件监听器
        newGameBtn.addEventListener('click', () => initGame(currentDifficulty));
        pauseBtn.addEventListener('click', togglePause);
        restartBtn.addEventListener('click', () => {
            gameOverElement.classList.remove('active');
            initGame(currentDifficulty);
        });

        difficultyBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                difficultyBtns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentDifficulty = e.target.dataset.difficulty;
                initGame(currentDifficulty);
            });
        });

        // 初始化游戏
        initGame();
    </script>
</body>
</html>
