<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小游戏集合</title>
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2768422999984116"
        crossorigin="anonymous"></script>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 根变量定义 */
        :root {
            --primary-color: #00ffff;
            --secondary-color: #ff00ff;
            --accent-color: #ffff00;
            --bg-color: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #ffffff;
            --shadow: 0 4px 20px rgba(0, 255, 255, 0.3);
            --border-radius: 15px;
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #1a1a1a 50%, var(--bg-color) 100%);
            color: var(--text-color);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 背景动画 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(0, 255, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 0, 255, 0.1) 0%, transparent 50%);
            z-index: -1;
            animation: backgroundPulse 10s ease-in-out infinite alternate;
        }

        @keyframes backgroundPulse {
            0% { opacity: 0.3; }
            100% { opacity: 0.6; }
        }

        /* 容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* 头部 */
        header {
            text-align: center;
            margin: 40px 0 20px;
            position: relative;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            margin-bottom: 20px;
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            0% { filter: brightness(1); }
            100% { filter: brightness(1.3); }
        }

        .subtitle {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
        }

        /* 搜索和筛选区域 */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            padding: 10px 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .search-box input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-color);
            font-size: 1rem;
            width: 300px;
            padding: 5px 10px;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .filter-btn {
            background: var(--card-bg);
            color: var(--text-color);
            border: 1px solid rgba(0, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow);
            font-weight: 500;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--primary-color);
            color: var(--bg-color);
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0, 255, 255, 0.5);
        }

        /* 游戏网格 */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        /* 游戏卡片 */
        .game-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 255, 255, 0.2);
            transition: var(--transition);
            position: relative;
            cursor: pointer;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.1) 0%, rgba(255, 0, 255, 0.1) 100%);
            opacity: 0;
            transition: var(--transition);
            z-index: 1;
        }

        .game-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 10px 40px rgba(0, 255, 255, 0.6);
            border-color: var(--primary-color);
        }

        .game-card:hover::before {
            opacity: 1;
        }

        /* 卡片图片 */
        .card-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;
            position: relative;
            overflow: hidden;
        }

        .card-image::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.3) 100%);
        }

        /* 卡片内容 */
        .card-content {
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-color);
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .card-description {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 15px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
        }

        .card-stats {
            display: flex;
            gap: 15px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .play-btn {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: var(--bg-color);
            border: none;
            padding: 10px 20px;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-weight: 700;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.4);
        }

        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(0, 255, 255, 0.6);
        }

        /* 游戏容器 */
        .game-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container.active {
            display: flex;
        }

        .game-wrapper {
            position: relative;
            background: var(--bg-color);
            border-radius: var(--border-radius);
            box-shadow: 0 10px 50px rgba(0, 0, 255, 0.5);
            border: 1px solid rgba(0, 255, 255, 0.3);
            overflow: hidden;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: var(--card-bg);
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
        }

        .game-title-large {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-color);
        }

        .close-btn {
            background: var(--secondary-color);
            color: var(--text-color);
            border: none;
            padding: 10px 20px;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
            font-weight: 700;
        }

        .close-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(255, 0, 255, 0.5);
        }

        /* 游戏内容区域 */
        .game-content {
            padding: 30px;
            min-height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 页脚 */
        footer {
            text-align: center;
            padding: 40px 0;
            margin-top: 60px;
            color: rgba(255, 255, 255, 0.5);
            border-top: 1px solid rgba(0, 255, 255, 0.2);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            .controls {
                flex-direction: column;
                align-items: center;
            }
            
            .search-box input {
                width: 250px;
            }
            
            .games-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 20px;
            }
            
            .card-title {
                font-size: 1.2rem;
            }
            
            .game-wrapper {
                max-width: 90vw;
            }
            
            .game-content {
                padding: 20px;
            }
        }

        /* 加载动画 */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            font-size: 1.2rem;
            color: var(--text-color);
        }

        /* 404页面 */
        .error-page {
            text-align: center;
            padding: 100px 20px;
        }

        .error-page h1 {
            font-size: 5rem;
            font-weight: 800;
            color: var(--secondary-color);
            margin-bottom: 20px;
        }

        .error-page p {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
        }

        /* 返回按钮 */
        .back-btn {
            display: inline-block;
            background: var(--primary-color);
            color: var(--bg-color);
            padding: 15px 30px;
            border-radius: var(--border-radius);
            text-decoration: none;
            font-weight: 700;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.4);
        }

        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(0, 255, 255, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header>
            <h1>🎮 小游戏集合</h1>
            <p class="subtitle">探索各种有趣的小游戏，挑战你的技能和反应速度！</p>
        </header>

        <!-- 搜索和筛选区域 -->
        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索游戏...">
            </div>
            <button class="filter-btn active" data-category="all">全部游戏</button>
            <button class="filter-btn" data-category="action">动作游戏</button>
            <button class="filter-btn" data-category="puzzle">益智游戏</button>
            <button class="filter-btn" data-category="arcade">街机游戏</button>
            <button class="filter-btn" data-category="sports">体育游戏</button>
        </div>

        <!-- 游戏网格 -->
        <div class="games-grid" id="gamesGrid">
            <!-- 游戏卡片会通过JavaScript动态生成 -->
        </div>
    </div>

    <!-- 游戏容器 -->
    <div class="game-container" id="gameContainer">
        <div class="game-wrapper">
            <div class="game-header">
                <h2 class="game-title-large" id="currentGameTitle">游戏标题</h2>
                <button class="close-btn" id="closeGameBtn">关闭</button>
            </div>
            <div class="game-content" id="gameContent">
                <!-- 游戏内容将通过JavaScript加载 -->
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer>
        <p>© 2026 小游戏集合 | 使用现代Web技术构建</p>
    </footer>

    <script>
        // 游戏数据
        const games = [
            {
                id: 'tetris',
                title: '俄罗斯方块',
                category: 'puzzle',
                thumbnail: '🧱',
                rating: 4.8,
                plays: 12500,
                description: '经典的俄罗斯方块游戏，消除行数获得高分！'
            },
            {
                id: 'snake',
                title: '贪吃蛇',
                category: 'arcade',
                thumbnail: '🐍',
                rating: 4.6,
                plays: 9800,
                description: '控制蛇吃食物，越长得分越高！'
            },
            {
                id: 'flappybird',
                title: '飞扬的小鸟',
                category: 'action',
                thumbnail: '🐦',
                rating: 4.5,
                plays: 8500,
                description: '点击屏幕让小鸟飞过管道，挑战最高分！'
            },
            {
                id: '2048',
                title: '2048游戏',
                category: 'puzzle',
                thumbnail: '🎯',
                rating: 4.7,
                plays: 15200,
                description: '合并数字，得到2048！'
            },
            {
                id: 'sudoku',
                title: '数独',
                category: 'puzzle',
                thumbnail: '🔢',
                rating: 4.4,
                plays: 7800,
                description: '数字逻辑游戏，锻炼大脑！'
            },
            {
                id: 'minesweeper',
                title: '扫雷',
                category: 'strategy',
                thumbnail: '💣',
                rating: 4.3,
                plays: 6500,
                description: '经典扫雷游戏，小心地雷！'
            },
            {
                id: 'arkanoid',
                title: '打砖块',
                category: 'arcade',
                thumbnail: '🏓',
                rating: 4.5,
                plays: 8900,
                description: '用球拍反弹球，击碎所有砖块！'
            },
            {
                id: 'race',
                title: '赛车游戏',
                category: 'sports',
                thumbnail: '🏎️',
                rating: 4.7,
                plays: 13400,
                description: '驾驶赛车，超越对手！'
            },
            {
                id: 'memory',
                title: '记忆翻牌',
                category: 'puzzle',
                thumbnail: '🧠',
                rating: 4.2,
                plays: 5600,
                description: '翻开相同的卡片，考验记忆力！'
            },
            {
                id: 'space-invaders',
                title: '太空侵略者',
                category: 'action',
                thumbnail: '🚀',
                rating: 4.4,
                plays: 7300,
                description: '飞机大战！驾驶你的飞船，击败外星入侵者！'
            }
        ];

        // 初始化页面
        function initPage() {
            // 渲染游戏网格
            renderGames(games);
            
            // 绑定事件
            document.getElementById('searchInput').addEventListener('input', handleSearch);
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', handleFilter);
            });
            document.getElementById('closeGameBtn').addEventListener('click', closeGame);
            window.addEventListener('keydown', handleKeydown);
        }

        // 渲染游戏网格
        function renderGames(gameList) {
            const grid = document.getElementById('gamesGrid');
            grid.innerHTML = '';
            
            if (gameList.length === 0) {
                grid.innerHTML = '<div class="loading">未找到匹配的游戏</div>';
                return;
            }
            
            gameList.forEach(game => {
                const card = createGameCard(game);
                grid.appendChild(card);
            });
        }

        // 创建游戏卡片
        function createGameCard(game) {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.dataset.id = game.id;
            
            card.innerHTML = `
                <div class="card-image">
                    <span>${game.thumbnail}</span>
                </div>
                <div class="card-content">
                    <h3 class="card-title">${game.title}</h3>
                    <p class="card-description">${game.description}</p>
                    <div class="card-meta">
                        <div class="card-stats">
                            <span class="stat-item">⭐ ${game.rating}</span>
                            <span class="stat-item">👥 ${game.plays.toLocaleString()}</span>
                        </div>
                        <button class="play-btn" onclick="playGame('${game.id}')">玩游戏</button>
                    </div>
                </div>
            `;
            
            return card;
        }

        // 处理搜索
        function handleSearch(e) {
            const searchTerm = e.target.value.toLowerCase();
            const filteredGames = games.filter(game => 
                game.title.toLowerCase().includes(searchTerm) || 
                game.description.toLowerCase().includes(searchTerm)
            );
            
            renderGames(filteredGames);
        }

        // 处理筛选
        function handleFilter(e) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            e.target.classList.add('active');
            
            const category = e.target.dataset.category;
            
            if (category === 'all') {
                renderGames(games);
            } else {
                const filteredGames = games.filter(game => game.category === category);
                renderGames(filteredGames);
            }
        }

        // 玩游戏
        function playGame(gameId) {
            const game = games.find(g => g.id === gameId);
            if (!game) return;
            
            document.getElementById('currentGameTitle').textContent = game.title;
            document.getElementById('gameContainer').classList.add('active');
            
            // 加载游戏内容
            const gameContent = document.getElementById('gameContent');
            
            if (gameId === 'tetris') {
                gameContent.innerHTML = `
                    <div style="display: flex; justify-content: center; padding: 20px;">
                        <iframe src="run.html" width="800" height="600" style="border: none; border-radius: 8px;"></iframe>
                    </div>
                `;
            } else if (gameId === 'snake') {
                gameContent.innerHTML = `
                    <div style="display: flex; justify-content: center; padding: 20px;">
                        <iframe src="snake.html" width="800" height="600" style="border: none; border-radius: 8px;"></iframe>
                    </div>
                `;
            } else if (gameId === 'flappybird') {
                gameContent.innerHTML = `
                    <div style="display: flex; justify-content: center; padding: 20px;">
                        <iframe src="flappybird.html" width="800" height="600" style="border: none; border-radius: 8px;"></iframe>
                    </div>
                `;
            } else if (gameId === '2048') {
                gameContent.innerHTML = `
                    <div style="display: flex; justify-content: center; padding: 20px;">
                        <iframe src="2048.html" width="800" height="600" style="border: none; border-radius: 8px;"></iframe>
                    </div>
                `;
            } else if (gameId === 'sudoku') {
                gameContent.innerHTML = `
                    <div style="display: flex; justify-content: center; padding: 20px;">
                        <iframe src="sudoku.html" width="800" height="600" style="border: none; border-radius: 8px;"></iframe>
                    </div>
                `;
            } else if (gameId === 'minesweeper') {
                gameContent.innerHTML = `
                    <div style="display: flex; justify-content: center; padding: 20px;">
                        <iframe src="minesweeper.html" width="800" height="600" style="border: none; border-radius: 8px;"></iframe>
                    </div>
                `;
            } else if (gameId === 'arkanoid') {
                gameContent.innerHTML = `
                    <div style="display: flex; justify-content: center; padding: 20px;">
                        <iframe src="arkanoid.html" width="800" height="600" style="border: none; border-radius: 8px;"></iframe>
                    </div>
                `;
            } else if (gameId === 'race') {
                gameContent.innerHTML = `
                    <div style="display: flex; justify-content: center; padding: 20px;">
                        <iframe src="race.html" width="800" height="600" style="border: none; border-radius: 8px;"></iframe>
                    </div>
                `;
            } else if (gameId === 'memory') {
                gameContent.innerHTML = `
                    <div style="display: flex; justify-content: center; padding: 20px;">
                        <iframe src="memory.html" width="800" height="600" style="border: none; border-radius: 8px;"></iframe>
                    </div>
                `;
            } else if (gameId === 'space-invaders') {
                gameContent.innerHTML = `
                    <div style="display: flex; justify-content: center; padding: 20px;">
                        <iframe src="space-invaders.html" width="800" height="600" style="border: none; border-radius: 8px;"></iframe>
                    </div>
                `;
            } else {
                gameContent.innerHTML = `
                    <div style="text-align: center; padding: 60px;">
                        <h3>游戏开发中...</h3>
                        <p style="color: #666; margin-top: 10px;">该游戏正在开发中，敬请期待！</p>
                    </div>
                `;
            }
        }

        // 关闭游戏
        function closeGame() {
            document.getElementById('gameContainer').classList.remove('active');
            document.getElementById('gameContent').innerHTML = '';
        }

        // 处理键盘事件
        function handleKeydown(e) {
            if (e.key === 'Escape' && document.getElementById('gameContainer').classList.contains('active')) {
                closeGame();
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
