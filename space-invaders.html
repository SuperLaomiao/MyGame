<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空侵略者</title>
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2768422999984116"
        crossorigin="anonymous"></script>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 根变量定义 */
        :root {
            --primary-color: #00ffff;
            --secondary-color: #ff00ff;
            --accent-color: #ffff00;
            --bg-color: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #ffffff;
            --shadow: 0 4px 20px rgba(0, 255, 255, 0.3);
            --border-radius: 15px;
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #1a1a1a 50%, var(--bg-color) 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 背景动画 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(0, 255, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 0, 255, 0.1) 0%, transparent 50%);
            z-index: -1;
            animation: backgroundPulse 10s ease-in-out infinite alternate;
        }

        @keyframes backgroundPulse {
            0% { opacity: 0.3; }
            100% { opacity: 0.6; }
        }

        /* 游戏容器 */
        .game-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 255, 255, 0.3);
            position: relative;
            max-width: 1000px;
            width: 100%;
            margin: 20px;
        }

        /* 游戏标题 */
        .game-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            text-align: center;
            margin-bottom: 20px;
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            0% { filter: brightness(1); }
            100% { filter: brightness(1.3); }
        }

        /* 游戏控制区域 */
        .game-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: var(--border-radius);
            border: 1px solid rgba(0, 255, 255, 0.2);
            flex-wrap: wrap;
        }

        .game-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: var(--bg-color);
            border: none;
            padding: 10px 20px;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-weight: 700;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.4);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(0, 255, 255, 0.6);
        }

        /* 游戏信息 */
        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: var(--border-radius);
            border: 1px solid rgba(0, 255, 255, 0.2);
            flex-wrap: wrap;
            gap: 20px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .info-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        /* 游戏板 */
        .game-board {
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 255, 255, 0.3);
            position: relative;
            height: 600px;
            margin-bottom: 30px;
        }

        /* 游戏背景 */
        .game-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 255, 0.5) 100%);
            z-index: -1;
            overflow: hidden;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* 游戏元素 */
        .player {
            position: absolute;
            width: 50px;
            height: 50px;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            border-radius: 50%;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 255, 255, 0.3);
            font-size: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .player:hover {
            transform: translateX(-50%) scale(1.1);
            box-shadow: 0 6px 25px rgba(0, 255, 255, 0.6);
        }

        .enemy {
            position: absolute;
            width: 40px;
            height: 40px;
            background: linear-gradient(45deg, var(--secondary-color), var(--accent-color));
            border-radius: 50%;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 255, 255, 0.3);
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .enemy:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 25px rgba(255, 0, 255, 0.6);
        }

        .bullet {
            position: absolute;
            width: 5px;
            height: 20px;
            background: var(--accent-color);
            border-radius: 2px;
            box-shadow: 0 0 10px rgba(255, 255, 0, 0.8);
            animation: bulletMove 0.5s linear infinite;
        }

        @keyframes bulletMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }

        /* 游戏结束界面 */
        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-bg);
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 50px rgba(0, 0, 255, 0.5);
            border: 1px solid rgba(0, 255, 255, 0.3);
            z-index: 1000;
            text-align: center;
            display: none;
        }

        .game-over.active {
            display: block;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .game-over h2 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            margin-bottom: 20px;
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        .game-over p {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .game-board {
                height: 400px;
            }

            .player {
                width: 40px;
                height: 40px;
                font-size: 1.5rem;
            }

            .enemy {
                width: 30px;
                height: 30px;
                font-size: 1rem;
            }

            .game-title {
                font-size: 2rem;
            }

            .game-buttons {
                flex-direction: column;
                width: 100%;
            }

            .btn {
                width: 100%;
            }
        }

        /* 加载动画 */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            font-size: 1.2rem;
            color: var(--text-color);
        }

        /* 返回按钮 */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--card-bg);
            color: var(--text-color);
            border: 1px solid rgba(0, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow);
            font-weight: 500;
        }

        .back-btn:hover {
            background: var(--primary-color);
            color: var(--bg-color);
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <button class="back-btn" onclick="window.location.href='index.html'">← 回到主页</button>
        <h1 class="game-title">🚀 太空侵略者</h1>
        
        <div class="game-controls">
            <div class="game-buttons">
                <button class="btn" id="newGameBtn">新游戏</button>
                <button class="btn" id="pauseBtn">暂停</button>
            </div>
        </div>

        <div class="game-info">
            <div class="info-item">
                <span class="info-label">得分</span>
                <span class="info-value" id="score">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">生命</span>
                <span class="info-value" id="lives">3</span>
            </div>
            <div class="info-item">
                <span class="info-label">波数</span>
                <span class="info-value" id="wave">1</span>
            </div>
        </div>

        <div class="game-board" id="gameBoard">
            <div class="game-bg" id="gameBg"></div>
        </div>

        <div class="game-over" id="gameOver">
            <h2 id="gameOverTitle">游戏结束!</h2>
            <p id="gameOverMessage">很遗憾，你被敌机击中了！</p>
            <p>得分: <span id="finalScore">0</span></p>
            <p>生命: <span id="finalLives">3</span></p>
            <p>波数: <span id="finalWave">1</span></p>
            <button class="btn" id="restartBtn">再玩一次</button>
        </div>
    </div>

    <script>
        // 太空侵略者游戏实现
        const GAME_WIDTH = 800;
        const GAME_HEIGHT = 600;
        const PLAYER_SPEED = 5;
        const ENEMY_SPEED = 2;
        const BULLET_SPEED = 10;
        const PLAYER_BULLET_COOLDOWN = 300;
        const ENEMY_SPAWN_INTERVAL = 1000;
        const PLAYER_BULLET_DAMAGE = 1;

        let player = { x: 400, y: 500, width: 50, height: 50, speed: PLAYER_SPEED, lastShot: 0 };
        let enemies = [];
        let bullets = [];
        let enemyBullets = [];
        let score = 0;
        let lives = 3;
        let wave = 1;
        let gameOver = false;
        let gamePaused = false;
        let animationId;
        let enemySpawnTimer;
        let lastShotTime = 0;
        let lastRenderTime = 0;
        const MAX_FPS = 60;
        const MIN_FRAME_TIME = 1000 / MAX_FPS;
        let keysPressed = {};

        const gameBoardElement = document.getElementById('gameBoard');
        const gameBgElement = document.getElementById('gameBg');
        const scoreElement = document.getElementById('score');
        const livesElement = document.getElementById('lives');
        const waveElement = document.getElementById('wave');
        const newGameBtn = document.getElementById('newGameBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const gameOverElement = document.getElementById('gameOver');
        const gameOverTitle = document.getElementById('gameOverTitle');
        const gameOverMessage = document.getElementById('gameOverMessage');
        const finalScoreElement = document.getElementById('finalScore');
        const finalLivesElement = document.getElementById('finalLives');
        const finalWaveElement = document.getElementById('finalWave');
        const restartBtn = document.getElementById('restartBtn');

        // 初始化游戏
        function initGame() {
            // 清除游戏状态
            enemies.forEach(enemy => enemy.element.remove());
            bullets.forEach(bullet => bullet.element.remove());
            enemyBullets.forEach(bullet => bullet.element.remove());
            
            enemies = [];
            bullets = [];
            enemyBullets = [];
            score = 0;
            lives = 3;
            wave = 1;
            gameOver = false;
            gamePaused = false;
            lastRenderTime = 0;
            keysPressed = {};
            
            // 重置玩家位置
            player.x = 400;
            player.y = 500;
            
            // 更新 UI
            scoreElement.textContent = score;
            livesElement.textContent = lives;
            waveElement.textContent = wave;
            gameOverElement.classList.remove('active');
            
            // 生成星星背景
            generateStars();
            
            // 开始游戏循环
            animationId = requestAnimationFrame(gameLoop);
            
            // 开始生成敌人
            enemySpawnTimer = setInterval(spawnEnemy, ENEMY_SPAWN_INTERVAL);
        }

        // 生成星星背景
        function generateStars() {
            gameBgElement.innerHTML = '';
            const starCount = 200;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = `${Math.random() * GAME_WIDTH}px`;
                star.style.top = `${Math.random() * GAME_HEIGHT}px`;
                star.style.animationDuration = `${Math.random() * 2 + 1}s`;
                gameBgElement.appendChild(star);
            }
        }

        // 生成敌人
        function spawnEnemy() {
            if (gameOver || gamePaused) return;
            
            const enemy = {
                x: Math.random() * (GAME_WIDTH - 50),
                y: -50,
                width: 40,
                height: 40,
                speed: ENEMY_SPEED,
                direction: 1
            };
            
            const enemyElement = document.createElement('div');
            enemyElement.className = 'enemy';
            enemyElement.style.left = `${enemy.x}px`;
            enemyElement.style.top = `${enemy.y}px`;
            enemyElement.textContent = '👾';
            gameBoardElement.appendChild(enemyElement);
            
            enemy.element = enemyElement;
            enemies.push(enemy);
        }

        // 游戏循环
        function gameLoop(timestamp) {
            if (gameOver || gamePaused) {
                animationId = requestAnimationFrame(gameLoop);
                return;
            }
            
            const elapsed = timestamp - lastRenderTime;
            if (elapsed < MIN_FRAME_TIME) {
                animationId = requestAnimationFrame(gameLoop);
                return;
            }
            
            lastRenderTime = timestamp;
            
            update();
            draw();
            
            animationId = requestAnimationFrame(gameLoop);
        }

        // 处理键盘输入
        function handleKeyboardInput() {
            if (keysPressed['ArrowLeft']) {
                player.x = Math.max(0, player.x - player.speed);
            }
            if (keysPressed['ArrowRight']) {
                player.x = Math.min(GAME_WIDTH - player.width, player.x + player.speed);
            }
            if (keysPressed['ArrowUp']) {
                player.y = Math.max(0, player.y - player.speed);
            }
            if (keysPressed['ArrowDown']) {
                player.y = Math.min(GAME_HEIGHT - player.height, player.y + player.speed);
            }
            if (keysPressed[' '] && !gameOver && !gamePaused) {
                playerShoot();
            }
        }

        // 更新游戏状态
        function update() {
            // 处理键盘输入
            handleKeyboardInput();
            
            // 更新敌人
            enemies.forEach((enemy, index) => {
                enemy.y += enemy.speed;
                
                // 检查是否到达底部
                if (enemy.y > GAME_HEIGHT) {
                    enemy.element.remove();
                    enemies.splice(index, 1);
                    // 减少生命
                    lives--;
                    livesElement.textContent = lives;
                    
                    if (lives === 0) {
                        gameOver = true;
                        clearInterval(enemySpawnTimer);
                        clearInterval(animationId);
                        showGameOver('很遗憾，你被敌机击中了！');
                    }
                } else {
                    enemy.element.style.top = `${enemy.y}px`;
                }
            });
            
            // 更新子弹
            bullets.forEach((bullet, index) => {
                bullet.y -= BULLET_SPEED;
                
                // 检查是否到达顶部
                if (bullet.y < 0) {
                    bullet.element.remove();
                    bullets.splice(index, 1);
                } else {
                    bullet.element.style.top = `${bullet.y}px`;
                }
            });
            
            // 更新敌机子弹
            enemyBullets.forEach((bullet, index) => {
                bullet.y += BULLET_SPEED;
                
                // 检查是否到达底部
                if (bullet.y > GAME_HEIGHT) {
                    bullet.element.remove();
                    enemyBullets.splice(index, 1);
                } else {
                    bullet.element.style.top = `${bullet.y}px`;
                }
            });
            
            // 碰撞检测
            checkCollisions();
            
            // 敌机射击
            enemies.forEach(enemy => {
                if (Math.random() < 0.005) {
                    enemyShoot(enemy);
                }
            });
        }

        // 敌机射击
        function enemyShoot(enemy) {
            const bullet = {
                x: enemy.x + enemy.width / 2 - 2,
                y: enemy.y + enemy.height,
                width: 4,
                height: 15
            };
            
            const bulletElement = document.createElement('div');
            bulletElement.className = 'bullet';
            bulletElement.style.left = `${bullet.x}px`;
            bulletElement.style.top = `${bullet.y}px`;
            gameBoardElement.appendChild(bulletElement);
            
            bullet.element = bulletElement;
            enemyBullets.push(bullet);
        }

        // 检查碰撞
        function checkCollisions() {
            // 玩家子弹击中敌人
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const enemy = enemies[j];
                    if (
                        bullet.x < enemy.x + enemy.width &&
                        bullet.x + bullet.width > enemy.x &&
                        bullet.y < enemy.y + enemy.height &&
                        bullet.y + bullet.height > enemy.y
                    ) {
                        // 击中敌人
                        bullet.element.remove();
                        bullets.splice(i, 1);
                        
                        enemy.element.remove();
                        enemies.splice(j, 1);
                        
                        score += 10;
                        scoreElement.textContent = score;
                        break;
                    }
                }
            }
            
            // 敌机子弹击中玩家
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const bullet = enemyBullets[i];
                if (
                    bullet.x < player.x + player.width &&
                    bullet.x + bullet.width > player.x &&
                    bullet.y < player.y + player.height &&
                    bullet.y + bullet.height > player.y
                ) {
                    bullet.element.remove();
                    enemyBullets.splice(i, 1);
                    
                    lives--;
                    livesElement.textContent = lives;
                    
                    if (lives === 0) {
                        gameOver = true;
                        clearInterval(enemySpawnTimer);
                        clearInterval(animationId);
                        showGameOver('很遗憾，你被敌机击中了！');
                    }
                    break;
                }
            }
            
            // 敌机碰撞玩家
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                if (
                    enemy.x < player.x + player.width &&
                    enemy.x + enemy.width > player.x &&
                    enemy.y < player.y + player.height &&
                    enemy.y + enemy.height > player.y
                ) {
                    enemy.element.remove();
                    enemies.splice(i, 1);
                    
                    lives--;
                    livesElement.textContent = lives;
                    
                    if (lives === 0) {
                        gameOver = true;
                        clearInterval(enemySpawnTimer);
                        clearInterval(animationId);
                        showGameOver('很遗憾，你被敌机击中了！');
                    }
                    break;
                }
            }
        }

        // 绘制游戏元素
        function draw() {
            // 绘制玩家
            const playerElement = document.querySelector('.player');
            if (!playerElement) {
                const playerDiv = document.createElement('div');
                playerDiv.className = 'player';
                playerDiv.textContent = '🚀';
                gameBoardElement.appendChild(playerDiv);
            }
            
            const playerDiv = document.querySelector('.player');
            playerDiv.style.left = `${player.x}px`;
            playerDiv.style.top = `${player.y}px`;
        }

        // 显示游戏结束信息
        function showGameOver(message) {
            gameOverTitle.textContent = '游戏结束!';
            gameOverMessage.textContent = message;
            finalScoreElement.textContent = score;
            finalLivesElement.textContent = lives;
            finalWaveElement.textContent = wave;
            gameOverElement.classList.add('active');
        }

        // 玩家射击
        function playerShoot() {
            const currentTime = Date.now();
            
            if (currentTime - lastShotTime < PLAYER_BULLET_COOLDOWN) {
                return;
            }
            
            const bullet = {
                x: player.x + player.width / 2 - 2,
                y: player.y,
                width: 4,
                height: 15
            };
            
            const bulletElement = document.createElement('div');
            bulletElement.className = 'bullet';
            bulletElement.style.left = `${bullet.x}px`;
            bulletElement.style.top = `${bullet.y}px`;
            gameBoardElement.appendChild(bulletElement);
            
            bullet.element = bulletElement;
            bullets.push(bullet);
            
            lastShotTime = currentTime;
        }

        // 移动玩家
        function movePlayer(direction) {
            if (direction === 'left') {
                player.x = Math.max(0, player.x - player.speed);
            } else if (direction === 'right') {
                player.x = Math.min(GAME_WIDTH - player.width, player.x + player.speed);
            } else if (direction === 'up') {
                player.y = Math.max(0, player.y - player.speed);
            } else if (direction === 'down') {
                player.y = Math.min(GAME_HEIGHT - player.height, player.y + player.speed);
            }
        }

        // 事件监听器
        document.addEventListener('keydown', (e) => {
            if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', ' '].includes(e.key)) {
                e.preventDefault();
                keysPressed[e.key] = true;
            }
        });

        document.addEventListener('keyup', (e) => {
            if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', ' '].includes(e.key)) {
                e.preventDefault();
                keysPressed[e.key] = false;
            }
        });

        newGameBtn.addEventListener('click', initGame);
        pauseBtn.addEventListener('click', () => {
            gamePaused = !gamePaused;
            pauseBtn.textContent = gamePaused ? '继续' : '暂停';
        });
        restartBtn.addEventListener('click', () => {
            gameOverElement.classList.remove('active');
            initGame();
        });

        // 初始化游戏
        initGame();
    </script>
</body>
</html>
