<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超级马里奥</title>
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2768422999984116"
        crossorigin="anonymous"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #5c94fc;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 5px;
        }

        .score {
            font-size: 24px;
            font-weight: bold;
        }

        .game-board {
            background-color: #90ee90;
            border: 3px solid #8B4513;
            border-radius: 5px;
            position: relative;
            width: 400px;
            height: 300px;
            overflow: hidden;
        }

        .player {
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: #FF6B6B;
            bottom: 0;
            left: 50px;
            border-radius: 5px 5px 0 0;
            z-index: 10;
        }

        .platform {
            position: absolute;
            background-color: #8B4513;
            border-radius: 2px;
        }

        .coin {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #FFD700;
            border-radius: 50%;
            animation: rotate 1s infinite linear;
            z-index: 5;
        }

        .enemy {
            position: absolute;
            width: 25px;
            height: 25px;
            background-color: #000000;
            border-radius: 3px;
            z-index: 5;
        }

        .flag {
            position: absolute;
            width: 30px;
            height: 50px;
            background-color: #FFFFFF;
            right: 50px;
            bottom: 0;
            z-index: 5;
        }

        .flag-pole {
            width: 5px;
            height: 100%;
            background-color: #8B4513;
            margin-left: auto;
            margin-right: auto;
        }

        .flag-texture {
            width: 25px;
            height: 15px;
            background-color: #FF0000;
            position: absolute;
            top: 0;
            left: 0;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .game-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            background-color: #8B4513;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #6B3413;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            z-index: 1000;
        }

        .game-over h2 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #FF0000;
        }

        .game-over p {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <div class="score">
                得分: <span id="score">0</span>
            </div>
            <div class="lives">
                生命: <span id="lives">3</span>
            </div>
        </div>

        <div class="game-board" id="gameBoard">
            <div class="player" id="player"></div>
            <!-- 游戏元素会通过JavaScript动态添加 -->
        </div>

        <div class="game-controls">
            <button class="btn" id="startBtn">开始游戏</button>
            <p>使用方向键移动，空格键跳跃</p>
        </div>

        <div class="game-over hidden" id="gameOver">
            <h2>游戏结束!</h2>
            <p>最终得分: <span id="finalScore">0</span></p>
            <button class="btn" id="restartBtn">再玩一次</button>
        </div>
    </div>

    <script>
        // 超级马里奥游戏实现
        const PLAYER_SPEED = 2;
        const JUMP_POWER = 15;
        const GRAVITY = 0.5;

        let gameRunning = false;
        let gamePaused = false;
        let score = 0;
        let lives = 3;
        let animationId;

        const gameBoard = document.getElementById('gameBoard');
        const player = document.getElementById('player');
        const scoreElement = document.getElementById('score');
        const livesElement = document.getElementById('lives');
        const startBtn = document.getElementById('startBtn');
        const gameOverElement = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');

        let platforms = [];
        let coins = [];
        let enemies = [];
        let playerState = {
            x: 50,
            y: 0,
            velocityX: 0,
            velocityY: 0,
            onGround: false
        };

        // 初始化游戏
        function initGame() {
            // 清空游戏板
            platforms.forEach(platform => platform.remove());
            coins.forEach(coin => coin.remove());
            enemies.forEach(enemy => enemy.remove());
            
            platforms = [];
            coins = [];
            enemies = [];
            score = 0;
            lives = 3;
            scoreElement.textContent = score;
            livesElement.textContent = lives;
            
            // 重置玩家位置
            playerState = {
                x: 50,
                y: 0,
                velocityX: 0,
                velocityY: 0,
                onGround: false
            };
            
            // 创建平台
            createPlatforms();
            // 创建硬币
            createCoins();
            // 创建敌人
            createEnemies();
            
            // 创建旗帜
            createFlag();
            
            gameRunning = true;
            gamePaused = false;
            startBtn.textContent = '游戏中';
            startBtn.disabled = true;
            gameOverElement.classList.add('hidden');
            
            gameLoop();
        }

        // 创建平台
        function createPlatforms() {
            // 地面平台
            const ground = document.createElement('div');
            ground.className = 'platform';
            ground.style.width = '100%';
            ground.style.height = '20px';
            ground.style.bottom = '0';
            ground.style.left = '0';
            gameBoard.appendChild(ground);
            platforms.push(ground);
            
            // 平台1
            const platform1 = document.createElement('div');
            platform1.className = 'platform';
            platform1.style.width = '80px';
            platform1.style.height = '20px';
            platform1.style.bottom = '80px';
            platform1.style.left = '100px';
            gameBoard.appendChild(platform1);
            platforms.push(platform1);
            
            // 平台2
            const platform2 = document.createElement('div');
            platform2.className = 'platform';
            platform2.style.width = '80px';
            platform2.style.height = '20px';
            platform2.style.bottom = '150px';
            platform2.style.left = '200px';
            gameBoard.appendChild(platform2);
            platforms.push(platform2);
            
            // 平台3
            const platform3 = document.createElement('div');
            platform3.className = 'platform';
            platform3.style.width = '80px';
            platform3.style.height = '20px';
            platform3.style.bottom = '200px';
            platform3.style.left = '150px';
            gameBoard.appendChild(platform3);
            platforms.push(platform3);
        }

        // 创建硬币
        function createCoins() {
            // 硬币1
            const coin1 = document.createElement('div');
            coin1.className = 'coin';
            coin1.style.bottom = '100px';
            coin1.style.left = '150px';
            gameBoard.appendChild(coin1);
            coins.push(coin1);
            
            // 硬币2
            const coin2 = document.createElement('div');
            coin2.className = 'coin';
            coin2.style.bottom = '170px';
            coin2.style.left = '220px';
            gameBoard.appendChild(coin2);
            coins.push(coin2);
            
            // 硬币3
            const coin3 = document.createElement('div');
            coin3.className = 'coin';
            coin3.style.bottom = '220px';
            coin3.style.left = '180px';
            gameBoard.appendChild(coin3);
            coins.push(coin3);
        }

        // 创建敌人
        function createEnemies() {
            // 敌人1
            const enemy1 = document.createElement('div');
            enemy1.className = 'enemy';
            enemy1.style.bottom = '20px';
            enemy1.style.left = '250px';
            gameBoard.appendChild(enemy1);
            enemies.push(enemy1);
            
            // 敌人2
            const enemy2 = document.createElement('div');
            enemy2.className = 'enemy';
            enemy2.style.bottom = '90px';
            enemy2.style.left = '300px';
            gameBoard.appendChild(enemy2);
            enemies.push(enemy2);
        }

        // 创建旗帜
        function createFlag() {
            const flag = document.createElement('div');
            flag.className = 'flag';
            
            const pole = document.createElement('div');
            pole.className = 'flag-pole';
            
            const texture = document.createElement('div');
            texture.className = 'flag-texture';
            
            flag.appendChild(pole);
            flag.appendChild(texture);
            
            gameBoard.appendChild(flag);
        }

        // 游戏主循环
        function gameLoop() {
            if (gameRunning && !gamePaused) {
                update();
                render();
                animationId = requestAnimationFrame(gameLoop);
            }
        }

        // 更新游戏状态
        function update() {
            // 更新玩家
            updatePlayer();
            
            // 更新敌人
            updateEnemies();
            
            // 检查碰撞
            checkCollisions();
            
            // 检查是否到达旗帜
            if (playerState.x > gameBoard.offsetWidth - 100) {
                gameOver();
            }
        }

        // 更新玩家
        function updatePlayer() {
            // 应用重力
            playerState.velocityY += GRAVITY;
            
            // 更新位置
            playerState.x += playerState.velocityX;
            playerState.y += playerState.velocityY;
            
            // 边界检查
            if (playerState.x < 0) {
                playerState.x = 0;
            }
            if (playerState.x > gameBoard.offsetWidth - 30) {
                playerState.x = gameBoard.offsetWidth - 30;
            }
            
            // 平台碰撞检测
            playerState.onGround = false;
            platforms.forEach(platform => {
                const rect = platform.getBoundingClientRect();
                const boardRect = gameBoard.getBoundingClientRect();
                
                const platformLeft = rect.left - boardRect.left;
                const platformTop = boardRect.height - (rect.bottom - boardRect.top);
                const platformRight = rect.right - boardRect.left;
                const platformBottom = boardRect.height - (rect.top - boardRect.top);
                
                // 检查碰撞
                if (playerState.x < platformRight && 
                    playerState.x + 30 > platformLeft && 
                    playerState.y < platformBottom && 
                    playerState.y + 30 > platformTop) {
                    // 如果玩家在向下移动
                    if (playerState.velocityY > 0) {
                        playerState.y = platformTop - 30;
                        playerState.velocityY = 0;
                        playerState.onGround = true;
                    }
                }
            });
            
            // 防止玩家掉出屏幕底部
            if (playerState.y > gameBoard.offsetHeight) {
                loseLife();
            }
        }

        // 更新敌人
        function updateEnemies() {
            enemies.forEach(enemy => {
                // 敌人简单的左右移动
                const rect = enemy.getBoundingClientRect();
                const boardRect = gameBoard.getBoundingClientRect();
                const enemyLeft = rect.left - boardRect.left;
                
                if (enemyLeft > 300 || enemyLeft < 250) {
                    enemy.style.left = (300 - (enemyLeft - 250)) + 'px';
                } else {
                    enemy.style.left = (parseInt(enemy.style.left) || 250) + (Math.random() > 0.5 ? 1 : -1) + 'px';
                }
            });
        }

        // 检查碰撞
        function checkCollisions() {
            // 硬币碰撞
            coins.forEach((coin, index) => {
                const rect = coin.getBoundingClientRect();
                const boardRect = gameBoard.getBoundingClientRect();
                
                const coinLeft = rect.left - boardRect.left;
                const coinTop = boardRect.height - (rect.bottom - boardRect.top);
                const coinRight = rect.right - boardRect.left;
                const coinBottom = boardRect.height - (rect.top - boardRect.top);
                
                if (playerState.x < coinRight && 
                    playerState.x + 30 > coinLeft && 
                    playerState.y < coinBottom && 
                    playerState.y + 30 > coinTop) {
                    // 收集硬币
                    score += 10;
                    scoreElement.textContent = score;
                    coin.remove();
                    coins.splice(index, 1);
                }
            });
            
            // 敌人碰撞
            enemies.forEach((enemy, index) => {
                const rect = enemy.getBoundingClientRect();
                const boardRect = gameBoard.getBoundingClientRect();
                
                const enemyLeft = rect.left - boardRect.left;
                const enemyTop = boardRect.height - (rect.bottom - boardRect.top);
                const enemyRight = rect.right - boardRect.left;
                const enemyBottom = boardRect.height - (rect.top - boardRect.top);
                
                if (playerState.x < enemyRight && 
                    playerState.x + 30 > enemyLeft && 
                    playerState.y < enemyBottom && 
                    playerState.y + 30 > enemyTop) {
                    // 如果玩家在跳跃
                    if (playerState.velocityY > 0) {
                        // 消灭敌人
                        enemy.remove();
                        enemies.splice(index, 1);
                        playerState.velocityY = -5; // 反弹
                        score += 50;
                        scoreElement.textContent = score;
                    } else {
                        // 失去生命
                        loseLife();
                    }
                }
            });
        }

        // 失去生命
        function loseLife() {
            lives--;
            livesElement.textContent = lives;
            
            if (lives <= 0) {
                gameOver();
            } else {
                // 重置玩家位置
                playerState = {
                    x: 50,
                    y: 0,
                    velocityX: 0,
                    velocityY: 0,
                    onGround: false
                };
            }
        }

        // 游戏结束
        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            finalScoreElement.textContent = score;
            gameOverElement.classList.remove('hidden');
            startBtn.textContent = '开始游戏';
            startBtn.disabled = false;
        }

        // 渲染游戏
        function render() {
            // 更新玩家位置
            player.style.left = playerState.x + 'px';
            player.style.bottom = playerState.y + 'px';
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            
            if (e.key === 'ArrowLeft') {
                playerState.velocityX = -PLAYER_SPEED;
            } else if (e.key === 'ArrowRight') {
                playerState.velocityX = PLAYER_SPEED;
            } else if (e.key === ' ') {
                if (playerState.onGround) {
                    playerState.velocityY = -JUMP_POWER;
                    playerState.onGround = false;
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                playerState.velocityX = 0;
            }
        });

        // 按钮事件
        startBtn.addEventListener('click', initGame);
        restartBtn.addEventListener('click', initGame);
    </script>
</body>
</html>
